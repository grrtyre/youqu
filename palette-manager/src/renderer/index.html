<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>调色板管理器</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <span class="dot dot-a"></span>
        <span class="dot dot-b"></span>
        <span class="dot dot-c"></span>
      </div>
      <div class="brand-text">
        <h1>调色板管理器</h1>
        <span class="brand-sub">Palette Manager · 优雅配色方案</span>
      </div>
    </div>

    <nav class="modes" id="modeList" role="tablist" aria-label="色彩理论模式"></nav>

    <div class="topbar-actions">
      <button class="icon-btn" id="contrastBtn" title="对比度检查" aria-label="对比度检查">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M12 3v18"></path>
          <path d="M12 3a9 9 0 0 0 0 18"></path>
        </svg>
      </button>
      <button class="icon-btn" id="favoritesBtn" title="我的收藏" aria-label="我的收藏">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"></path>
        </svg>
      </button>
      <button class="icon-btn" id="exportBtn" title="导出" aria-label="导出">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12"></path>
          <path d="m7 8 5-5 5 5"></path>
          <path d="M5 21h14"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- 主调色板展示区 -->
  <main class="palette" id="palette" aria-label="调色板"></main>

  <!-- 底部工具栏 -->
  <footer class="toolbar">
    <div class="toolbar-left">
      <button class="primary-btn" id="generateBtn" title="生成新调色板 (空格)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9c2.5 0 4.5 1 6 2.5"></path>
          <path d="M21 3v6h-6"></path>
        </svg>
        <span>生成调色板</span>
      </button>
      <button class="ghost-btn" id="imageBtn" title="从图片提取配色">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"></rect>
          <circle cx="9" cy="9" r="2"></circle>
          <path d="m21 15-4.5-4.5L9 18"></path>
        </svg>
        <span>图片取色</span>
      </button>
      <input type="file" id="imageInput" accept="image/*" hidden />
    </div>

    <div class="toolbar-center">
      <div class="hint" id="hintText">点击色块复制 · 空格生成 · 锁定保持颜色</div>
    </div>

    <div class="toolbar-right">
      <span class="palette-name" id="paletteName">未命名配色</span>
    </div>
  </footer>

  <!-- 对比度检查面板 -->
  <section class="panel" id="contrastPanel" hidden>
    <div class="panel-head">
      <h2>对比度检查 · WCAG 无障碍</h2>
      <button class="ghost-btn sm" id="contrastClose" aria-label="关闭">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
      </button>
    </div>
    <div class="panel-body">
      <div class="contrast-form">
        <label class="field">
          <span>前景色</span>
          <input type="color" id="contrastFg" value="#1d1d1f" />
        </label>
        <label class="field">
          <span>背景色</span>
          <input type="color" id="contrastBg" value="#ffffff" />
        </label>
        <div class="contrast-result" id="contrastResult"></div>
      </div>
      <div class="contrast-preview" id="contrastPreview">
        <p class="preview-large">调色板管理器</p>
        <p class="preview-small">AaBb 文字示例 · The quick brown fox</p>
      </div>
    </div>
  </section>

  <!-- 收藏面板 -->
  <section class="panel" id="favoritesPanel" hidden>
    <div class="panel-head">
      <h2>我的收藏</h2>
      <div class="panel-actions">
        <button class="ghost-btn sm" id="saveCurrentBtn">收藏当前</button>
        <button class="ghost-btn sm" id="favoritesClose" aria-label="关闭">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
        </button>
      </div>
    </div>
    <div class="panel-body" id="favoritesList"></div>
  </section>

  <!-- 导出面板 -->
  <section class="panel" id="exportPanel" hidden>
    <div class="panel-head">
      <h2>导出调色板</h2>
      <button class="ghost-btn sm" id="exportClose" aria-label="关闭">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
      </button>
    </div>
    <div class="panel-body">
      <div class="export-tabs" id="exportTabs">
        <button class="export-tab active" data-format="css">CSS</button>
        <button class="export-tab" data-format="scss">SCSS</button>
        <button class="export-tab" data-format="json">JSON</button>
        <button class="export-tab" data-format="tailwind">Tailwind</button>
      </div>
      <pre class="export-code" id="exportCode"></pre>
      <button class="primary-btn" id="copyExportBtn">复制代码</button>
      <button class="ghost-btn" id="downloadPngBtn">导出 PNG 预览图</button>
    </div>
  </section>

  <!-- Toast 提示 -->
  <div class="toast" id="toast" hidden></div>

  <script src="color-theory.js"></script>
  <script src="app.js"></script>
</body>
</html>
