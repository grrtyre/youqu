<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>表格管家</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 自定义标题栏 -->
    <header class="titlebar">
      <div class="titlebar-drag">
        <div class="titlebar-brand">
          <svg viewBox="0 0 32 32" width="16" height="16" class="titlebar-logo">
            <rect x="3" y="5" width="26" height="22" rx="4" fill="#007aff"/>
            <rect x="3" y="5" width="26" height="6" rx="4" fill="#0066d6"/>
            <line x1="11" y1="5" x2="11" y2="27" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
            <line x1="19" y1="5" x2="19" y2="27" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
            <line x1="3" y1="11" x2="29" y2="11" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
            <line x1="3" y1="17" x2="29" y2="17" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
            <line x1="3" y1="23" x2="29" y2="23" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
          </svg>
          <span>表格管家</span>
        </div>
      </div>
      <div class="titlebar-controls">
        <button class="win-btn" id="winMin" title="最小化" aria-label="最小化">
          <svg viewBox="0 0 10 10" width="10" height="10"><rect x="1" y="4.5" width="8" height="1.2" fill="currentColor"/></svg>
        </button>
        <button class="win-btn" id="winMax" title="最大化" aria-label="最大化">
          <svg viewBox="0 0 10 10" width="10" height="10" class="icon-max"><rect x="1.2" y="1.2" width="7.6" height="7.6" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          <svg viewBox="0 0 10 10" width="10" height="10" class="icon-restore" hidden><rect x="1.5" y="3" width="5.5" height="5.5" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M3.5 3 V1.5 H9 V7 H7.5" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button class="win-btn win-close" id="winClose" title="关闭" aria-label="关闭">
          <svg viewBox="0 0 10 10" width="10" height="10"><path d="M1.5 1.5 L8.5 8.5 M8.5 1.5 L1.5 8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <div class="app-body">
      <!-- 左侧边栏 -->
      <aside class="sidebar">
        <button class="primary-btn" id="btnOpen">
          <svg viewBox="0 0 20 20" width="16" height="16"><path d="M4 5a2 2 0 0 1 2-2h3l2 2h3a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5z" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 11h4M10 9v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>打开文件</span>
        </button>

        <div class="side-section">
          <div class="side-title">最近打开</div>
          <div class="recent-list" id="recentList">
            <div class="recent-empty">暂无记录</div>
          </div>
        </div>

        <div class="side-section" id="sideOverview" hidden></div>

        <div class="side-section">
          <div class="side-title">导出</div>
          <div class="export-group">
            <button class="side-link" id="exportCSV" disabled>
              <svg viewBox="0 0 20 20" width="14" height="14"><path d="M3 5h14v10H3z" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M7 5v10M11 5v10" stroke="currentColor" stroke-width="1.2"/></svg>
              CSV 文件
            </button>
            <button class="side-link" id="exportJSON" disabled>
              <svg viewBox="0 0 20 20" width="14" height="14"><path d="M6 4h6l3 3v9a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M8 11h4M8 14h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
              JSON 数组
            </button>
            <button class="side-link" id="exportMD" disabled>
              <svg viewBox="0 0 20 20" width="14" height="14"><path d="M4 5h12v10H4z" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M6 12l2-4 2 4M11 8v4M11 8h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
              Markdown 表格
            </button>
            <button class="side-link" id="copyMD" disabled>
              <svg viewBox="0 0 20 20" width="14" height="14"><rect x="6" y="6" width="9" height="9" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M4 13V4a1 1 0 0 1 1-1h8" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
              复制 Markdown
            </button>
          </div>
        </div>

        <div class="sidebar-footer">
          <button class="link-btn" id="openAfdian">
            <svg viewBox="0 0 20 20" width="14" height="14"><path d="M10 3v10M6 9c0 2.2 1.8 4 4 4s4-1.8 4-4M8 16h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>
            <span>支持我们</span>
          </button>
        </div>
      </aside>

      <!-- 主内容区 -->
      <main class="main" id="mainArea">
        <!-- 空状态 -->
        <section class="empty-state" id="emptyState">
          <div class="drop-zone" id="dropZone">
            <div class="drop-icon">
              <svg viewBox="0 0 64 64" width="56" height="56">
                <rect x="8" y="14" width="48" height="40" rx="6" fill="rgba(0,122,255,0.08)"/>
                <rect x="8" y="14" width="48" height="40" rx="6" fill="none" stroke="#007aff" stroke-width="2" opacity="0.5"/>
                <line x1="8" y1="26" x2="56" y2="26" stroke="#007aff" stroke-width="2"/>
                <line x1="22" y1="14" x2="22" y2="54" stroke="#007aff" stroke-width="1.5" opacity="0.4"/>
                <line x1="38" y1="14" x2="38" y2="54" stroke="#007aff" stroke-width="1.5" opacity="0.4"/>
                <path d="M32 4v10M27 9l5-5 5 5" stroke="#007aff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="drop-title">拖拽 CSV / TSV 文件到此处</div>
            <div class="drop-sub">或点击上方「打开文件」按钮 · 完全本地处理，数据不出本机</div>
            <button class="ghost-btn" id="btnLoadDemo">加载示例数据预览</button>
          </div>
        </section>

        <!-- 数据视图 -->
        <section class="data-view" id="dataView" hidden>
          <!-- 工具栏 -->
          <div class="toolbar">
            <div class="toolbar-left">
              <div class="file-pill" id="filePill">
                <svg viewBox="0 0 20 20" width="14" height="14"><path d="M6 4h6l3 3v9a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
                <span id="fileName">未命名</span>
              </div>
              <div class="meta-pill" id="metaPill">—</div>
            </div>
            <div class="toolbar-right">
              <div class="search-box">
                <svg viewBox="0 0 20 20" width="14" height="14"><circle cx="8.5" cy="8.5" r="5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12.5 12.5 L17 17" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                <input type="text" id="searchInput" placeholder="搜索任意单元格…" />
              </div>
              <div class="del-select" id="delWrap" hidden>
                <span class="del-label">分隔符</span>
                <select id="delSelect">
                  <option value="auto">自动检测</option>
                  <option value=",">逗号 ,</option>
                  <option value="\t">制表符 Tab</option>
                  <option value=";">分号 ;</option>
                  <option value="|">竖线 |</option>
                </select>
              </div>
              <button class="tool-btn" id="btnChart" title="图表可视化" disabled>
                <svg viewBox="0 0 20 20" width="14" height="14"><path d="M4 16V10M10 16V4M16 16v-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
                <span>图表</span>
              </button>
            </div>
          </div>

          <!-- 统计卡片 -->
          <div class="stat-cards" id="statCards"></div>

          <!-- 图表面板 -->
          <section class="chart-panel" id="chartPanel" hidden>
            <div class="chart-header">
              <div class="chart-title">
                <svg viewBox="0 0 20 20" width="15" height="15"><path d="M4 16V10M10 16V4M16 16v-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
                <span>数据可视化</span>
              </div>
              <div class="chart-controls">
                <select id="chartColSelect" class="chart-select"></select>
                <div class="chart-type-toggle" id="chartTypeToggle">
                  <button class="chart-type-btn active" data-type="auto">自动</button>
                  <button class="chart-type-btn" data-type="histogram">直方图</button>
                  <button class="chart-type-btn" data-type="counts">计数图</button>
                </div>
              </div>
            </div>
            <div class="chart-body" id="chartBody"></div>
          </section>

          <!-- 数据表格容器 -->
          <div class="table-wrap" id="tableWrap">
            <table class="data-table" id="dataTable">
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>

          <!-- 底部状态条 -->
          <div class="status-bar">
            <span id="statusInfo">—</span>
            <span class="status-right" id="filterInfo"></span>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- 关于弹窗 -->
  <div class="modal-mask" id="aboutMask" hidden>
    <div class="modal-card">
      <div class="modal-icon">
        <svg viewBox="0 0 32 32" width="40" height="40">
          <rect x="3" y="5" width="26" height="22" rx="4" fill="#007aff"/>
          <line x1="11" y1="5" x2="11" y2="27" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
          <line x1="19" y1="5" x2="19" y2="27" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
          <line x1="3" y1="11" x2="29" y2="11" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
          <line x1="3" y1="17" x2="29" y2="17" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
          <line x1="3" y1="23" x2="29" y2="23" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
        </svg>
      </div>
      <div class="modal-title">表格管家</div>
      <div class="modal-version" id="aboutVersion">版本 1.1.0</div>
      <p class="modal-desc">本地 CSV / TSV 数据查看与分析工具，数据不出本机。</p>
      <div class="modal-actions">
        <button class="primary-btn sm" id="aboutClose">好的</button>
      </div>
    </div>
  </div>

  <script src="../core/csv-core.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
