<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 预览器</title>
  <meta name="description" content="苹果白风格的本地 Markdown 预览工具：实时编辑、GFM 语法、中文排版优化、代码高亮、目录大纲、一键导出 HTML/PDF">
  <meta name="theme-color" content="#007aff">
  <link rel="icon" href="icons/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=26">
</head>
<body>
  <div class="app">
    <!-- 顶部标题栏 -->
    <header class="titlebar">
      <div class="title-left">
        <button class="icon-btn" id="btn-toggle-toc" title="显示/隐藏目录" aria-label="目录">
          <svg viewBox="0 0 20 20" width="16" height="16"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M3 3h18v18H3V3zm2 2v14h14V5H5zm3 9V8h1.5l2 3 2-3H15v6h-1.5v-3.2L11.5 14l-2-3.2V14H8z" fill="currentColor"/></svg>
        </span>
        <h1 class="title">Markdown 预览器</h1>
        <span class="subtitle">实时编辑 · 本地渲染 · 隐私优先</span>
      </div>
      <div class="title-right">
        <div class="view-switch" role="tablist" aria-label="视图模式">
          <button class="switch-btn active" data-mode="split" title="分屏（Ctrl+1）" aria-label="分屏">
            <svg viewBox="0 0 16 16" width="14" height="14"><rect x="1" y="1" width="6" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="6" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
          </button>
          <button class="switch-btn" data-mode="edit" title="仅编辑（Ctrl+2）" aria-label="仅编辑">
            <svg viewBox="0 0 16 16" width="14" height="14"><path d="M2 12.5l8.5-8.5 2 2L4 14.5H2v-2z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          </button>
          <button class="switch-btn" data-mode="preview" title="仅预览（Ctrl+3）" aria-label="仅预览">
            <svg viewBox="0 0 16 16" width="14" height="14"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" fill="none" stroke="currentColor" stroke-width="1.4"/><circle cx="8" cy="8" r="2" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
          </button>
        </div>
        <div class="actions">
          <button class="btn" id="btn-open" title="打开 .md 文件">打开</button>
          <span class="action-sep" aria-hidden="true"></span>
          <button class="btn" id="btn-copy" title="复制渲染后的 HTML">复制</button>
          <button class="btn" id="btn-save-md" title="保存为 .md 文件（Ctrl+S）">存 md</button>
          <button class="btn" id="btn-export" title="导出为独立 HTML 文件（Ctrl+Shift+E）">导出</button>
          <button class="btn" id="btn-pdf" title="打印 / 导出 PDF">PDF</button>
          <span class="action-sep" aria-hidden="true"></span>
          <button class="btn" id="btn-clear" title="清空编辑区">清空</button>
          <button class="icon-btn" id="btn-theme" title="切换主题" aria-label="主题">
            <svg class="icon-light" viewBox="0 0 20 20" width="16" height="16"><circle cx="10" cy="10" r="3.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M10 1.5v2M10 16.5v2M2.5 10h-2M19.5 10h-2M4.3 4.3L3 3M17 17l-1.3-1.3M4.3 15.7L3 17M17 3l-1.3 1.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            <svg class="icon-dark" viewBox="0 0 20 20" width="16" height="16" hidden><path d="M17 11.5a7 7 0 01-9-9 7 7 0 109 9z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- 主体：目录 + 编辑 + 预览 -->
    <main class="main" id="main">
      <!-- 目录大纲侧边栏 -->
      <aside class="toc-pane" id="toc-pane" hidden>
        <div class="pane-header">
          <span class="pane-label">目录</span>
          <span class="pane-meta" id="toc-meta">0</span>
        </div>
        <nav class="toc-list" id="toc-list" aria-label="文档目录">
          <div class="empty-hint">无标题</div>
        </nav>
      </aside>

      <section class="pane editor-pane" id="editor-pane">
        <div class="pane-header">
          <span class="pane-label">编辑</span>
          <span class="pane-meta" id="editor-meta">0 字</span>
        </div>
        <textarea id="editor" class="editor" spellcheck="false" placeholder="在此输入 Markdown…&#10;&#10;# 标题&#10;**粗体** *斜体* ~~删除线~~&#10;- 列表项&#10;[链接](https://example.com)&#10;&#10;左侧编辑，右侧实时预览。&#10;支持拖拽 .md 文件直接打开。"></textarea>
      </section>

      <div class="gutter" id="gutter" title="拖动调整宽度"></div>

      <section class="pane preview-pane" id="preview-pane">
        <div class="pane-header">
          <span class="pane-label">预览</span>
          <span class="pane-meta" id="preview-meta">就绪</span>
        </div>
        <article id="preview" class="preview markdown-body">
          <div class="empty-hint">预览区将在此显示渲染结果</div>
        </article>
      </section>
    </main>

    <!-- 状态栏 -->
    <footer class="statusbar">
      <span id="stat-chars">字符 0</span>
      <span class="sep">·</span>
      <span id="stat-words">字数 0</span>
      <span class="sep">·</span>
      <span id="stat-lines">行数 1</span>
      <span class="sep">·</span>
      <span id="stat-reading" title="按 中文 300 字/分钟、英文 200 词/分钟 估算">阅读 0 分钟</span>
      <span class="spacer"></span>
      <span class="status-tip" id="status-tip">就绪 · 内容自动保存到本地</span>
    </footer>
  </div>

  <input type="file" id="file-input" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden>

  <script src="markdown-parser.js?v=26"></script>
  <script src="renderer.js?v=26"></script>
  <script>
    // PWA Service Worker 注册（仅 http/https 协议下生效，file:// 双击打开不注册但应用照常可用）
    if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
