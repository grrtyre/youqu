<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>标注编辑器 - 截图管家</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <header class="titlebar">
    <div class="titlebar-drag">
      <span class="title">标注编辑器</span>
    </div>
    <div class="titlebar-actions">
      <button class="title-btn btn-min" id="btnMin" title="最小化">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 5h8" stroke="currentColor" stroke-width="1.4"/></svg>
      </button>
      <button class="title-btn btn-max" id="btnMax" title="最大化">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="1" width="8" height="8" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      </button>
      <button class="title-btn btn-close" id="btnClose" title="关闭">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.4"/></svg>
      </button>
    </div>
  </header>

  <div class="workspace">
    <!-- 工具栏 -->
    <aside class="toolbar">
      <div class="tool-group">
        <button class="tool active" data-tool="rect" title="矩形">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="6" width="16" height="12" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="tool" data-tool="arrow" title="箭头">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 12h14M14 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="tool" data-tool="pen" title="画笔">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 20s2-6 8-6 8 6 8 6M14 6l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="tool" data-tool="text" title="文字">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 6h14M12 6v12M9 18h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="tool" data-tool="number" title="序号">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/><path d="M10 9h2v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="tool" data-tool="mosaic" title="马赛克">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="5" height="5" fill="currentColor"/><rect x="10" y="4" width="5" height="5" fill="currentColor" opacity="0.5"/><rect x="16" y="4" width="4" height="5" fill="currentColor"/><rect x="4" y="10" width="5" height="5" fill="currentColor" opacity="0.5"/><rect x="10" y="10" width="5" height="5" fill="currentColor"/><rect x="16" y="10" width="4" height="5" fill="currentColor" opacity="0.5"/><rect x="4" y="16" width="5" height="4" fill="currentColor"/><rect x="10" y="16" width="5" height="4" fill="currentColor" opacity="0.5"/><rect x="16" y="16" width="4" height="4" fill="currentColor"/></svg>
        </button>
      </div>

      <div class="tool-divider"></div>

      <!-- 颜色 -->
      <div class="color-group">
        <div class="color-row">
          <button class="color active" style="background:#ff3b30" data-color="#ff3b30"></button>
          <button class="color" style="background:#ff9500" data-color="#ff9500"></button>
          <button class="color" style="background:#ffcc00" data-color="#ffcc00"></button>
          <button class="color" style="background:#34c759" data-color="#34c759"></button>
        </div>
        <div class="color-row">
          <button class="color" style="background:#007aff" data-color="#007aff"></button>
          <button class="color" style="background:#5856d6" data-color="#5856d6"></button>
          <button class="color" style="background:#1d1d1f" data-color="#1d1d1f"></button>
          <button class="color" style="background:#ffffff;border:1px solid #d2d2d7" data-color="#ffffff"></button>
        </div>
      </div>

      <div class="tool-divider"></div>

      <!-- 线宽 -->
      <div class="size-group">
        <button class="size active" data-size="2"><span style="width:4px;height:4px"></span></button>
        <button class="size" data-size="4"><span style="width:7px;height:7px"></span></button>
        <button class="size" data-size="6"><span style="width:10px;height:10px"></span></button>
        <button class="size" data-size="10"><span style="width:14px;height:14px"></span></button>
      </div>

      <div class="tool-divider"></div>

      <button class="tool" id="btnUndo" title="撤销 (Ctrl+Z)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 7L4 12l5 5M4 12h11a5 5 0 010 10h-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="tool" id="btnRedo" title="重做 (Ctrl+Shift+Z)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 7l5 5-5 5M20 12H9a5 5 0 000 10h3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </aside>

    <!-- 画布区 -->
    <main class="canvas-area">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="bgCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>
        <canvas id="previewCanvas"></canvas>
        <div class="text-input-floating" id="textEditor" contenteditable="true"></div>
      </div>
    </main>

    <!-- 底部操作栏 -->
    <footer class="actions">
      <div class="status" id="status">就绪</div>
      <div class="action-btns">
        <button class="act" id="btnPin">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 4h6l-1 6 4 3v2H6v-2l4-3-1-6zM12 15v5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          贴图
        </button>
        <button class="act" id="btnSaveAs">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          另存为
        </button>
        <button class="act" id="btnSave">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 3h11l3 3v15H5V3zM9 3v5h7V3M9 21v-6h6v6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          保存到历史
        </button>
        <button class="act primary" id="btnCopy">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M9 6V4a2 2 0 012-2h6a2 2 0 012 2v6a2 2 0 01-2 2h-2" stroke="currentColor" stroke-width="2"/></svg>
          复制到剪贴板
        </button>
      </div>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script src="editor.js"></script>
</body>
</html>
