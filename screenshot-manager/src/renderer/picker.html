<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>截图选区</title>
  <link rel="stylesheet" href="picker.css">
</head>
<body>
  <div class="picker-overlay" id="overlay">
    <div class="bg-layer" id="bgLayer"></div>
    <div class="mask" id="mask"></div>
    <div class="selection" id="selection">
      <div class="sel-size" id="selSize">0 × 0</div>
    </div>
    <div class="hint" id="hint">拖拽选择截图区域 · Esc 取消</div>
    <div class="toolbar" id="toolbar">
      <button class="t-btn" id="btnCancel">取消</button>
      <button class="t-btn primary" id="btnOk">确定截图</button>
    </div>
  </div>
  <script src="picker.js"></script>
</body>
</html>
