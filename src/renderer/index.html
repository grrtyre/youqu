<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launcher Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="launcher-shell" id="shell">
    <header class="search-bar">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input
        id="search-input"
        type="text"
        placeholder="搜索应用，输入名称开始..."
        autocomplete="off"
        spellcheck="false"
      />
      <span class="hint-kbd" title="唤起/隐藏">Alt+Space</span>
    </header>

    <main class="results" id="results" role="listbox" aria-label="应用列表">
    </main>

    <footer class="status-bar">
      <span class="status-left">
        <span class="status-dot"></span>
        <span id="app-count">0</span> 个应用已索引
      </span>
      <span class="status-right">
        <span class="kbd-group"><kbd>↑</kbd><kbd>↓</kbd> 选择</span>
        <span class="kbd-group"><kbd>↵</kbd> 启动</span>
        <span class="kbd-group"><kbd>Esc</kbd> 关闭</span>
      </span>
    </footer>

    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="#c7c7cc" stroke-width="1.5"/>
          <path d="m20 20-3.5-3.5" stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="empty-title">未找到匹配的应用</p>
      <p class="empty-sub">试试输入应用名称的关键字</p>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
