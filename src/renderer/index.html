<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>磁盘管家</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- 顶部工具栏 -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 3a9 9 0 1 0 9 9h-9V3z" fill="#007aff" opacity="0.18"/>
            <path d="M12 3a9 9 0 0 1 9 9h-9V3z" fill="#007aff"/>
            <circle cx="12" cy="12" r="9" stroke="#007aff" stroke-width="1.4" fill="none"/>
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-title">磁盘管家</div>
          <div class="brand-sub">空间可视化分析器</div>
        </div>
      </div>

      <div class="topbar-actions">
        <div class="path-input-wrap">
          <input id="pathInput" class="path-input" type="text" placeholder="选择或输入要扫描的文件夹路径…" spellcheck="false">
          <button id="browseBtn" class="btn btn-ghost" title="浏览">选择…</button>
        </div>
        <button id="scanBtn" class="btn btn-primary" disabled>开始扫描</button>
        <button id="cancelBtn" class="btn btn-ghost hidden">取消</button>
      </div>
    </header>

    <!-- 进度条 -->
    <div id="progressBar" class="progress-bar hidden">
      <div class="progress-info">
        <span id="progressText">准备扫描…</span>
        <span id="progressCount"></span>
      </div>
      <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <!-- 主体 -->
    <main class="main">
      <!-- 侧栏 -->
      <aside class="sidebar">
        <section class="card summary-card">
          <div class="card-title">扫描概览</div>
          <div class="summary-grid">
            <div class="summary-item">
              <div class="summary-label">总占用</div>
              <div id="sumSize" class="summary-value">—</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">文件数</div>
              <div id="sumFiles" class="summary-value">—</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">文件夹</div>
              <div id="sumDirs" class="summary-value">—</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">扫描用时</div>
              <div id="sumTime" class="summary-value">—</div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-title">类型分布</div>
          <div id="categoryList" class="category-list">
            <div class="empty-hint">尚未扫描</div>
          </div>
        </section>

        <section class="card">
          <div class="card-title">扩展名排行</div>
          <div id="extList" class="ext-list">
            <div class="empty-hint">尚未扫描</div>
          </div>
        </section>
      </aside>

      <!-- 主内容 -->
      <section class="content">
        <!-- 面包屑 -->
        <div class="content-toolbar">
          <div id="breadcrumb" class="breadcrumb">
            <span class="crumb-root">Treemap 视图</span>
          </div>
          <div class="toolbar-right">
            <label class="seg">
              <span class="seg-label">深度</span>
              <select id="depthSelect" class="seg-select">
                <option value="1">1 层</option>
                <option value="2" selected>2 层</option>
                <option value="3">3 层</option>
              </select>
            </label>
            <button id="backBtn" class="btn btn-tiny" disabled>← 返回</button>
          </div>
        </div>

        <!-- Treemap 画布 -->
        <div id="treemapWrap" class="treemap-wrap">
          <canvas id="treemap" width="800" height="500"></canvas>
          <div id="treemapEmpty" class="treemap-empty">
            <div class="empty-illustration">
              <svg width="72" height="72" viewBox="0 0 24 24" fill="none">
                <ellipse cx="12" cy="6" rx="8" ry="3" stroke="#cfd6dd" stroke-width="1.2"/>
                <path d="M4 6v12c0 1.66 3.58 3 8 3s8-1.34 8-3V6" stroke="#cfd6dd" stroke-width="1.2"/>
                <path d="M4 12c0 1.66 3.58 3 8 3s8-1.34 8-3" stroke="#cfd6dd" stroke-width="1.2"/>
              </svg>
            </div>
            <div class="empty-title">选择一个文件夹开始扫描</div>
            <div class="empty-sub">支持任意本地磁盘 / 目录，数据完全本地处理，不上传</div>
          </div>
          <div id="tooltip" class="tooltip hidden"></div>
        </div>

        <!-- Top 大文件 -->
        <div class="card top-files-card">
          <div class="card-title">
            <span>大文件排行</span>
            <span id="topFilesHint" class="card-sub"></span>
          </div>
          <div class="top-files-head">
            <div class="col-name">文件</div>
            <div class="col-size">大小</div>
            <div class="col-pct">占比</div>
            <div class="col-op">操作</div>
          </div>
          <div id="topFiles" class="top-files-body">
            <div class="empty-hint">尚未扫描</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- 删除确认弹窗 -->
  <div id="confirmModal" class="modal-mask hidden">
    <div class="modal">
      <div class="modal-title">确认删除</div>
      <div id="confirmMsg" class="modal-msg"></div>
      <div class="modal-actions">
        <button id="confirmCancel" class="btn btn-ghost">取消</button>
        <button id="confirmOk" class="btn btn-danger">移到回收站</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="renderer.js"></script>
</body>
</html>
