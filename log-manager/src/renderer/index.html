<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日志管家</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- 自定义标题栏 -->
    <div class="titlebar">
      <div class="titlebar-drag">
        <div class="titlebar-brand">
          <svg class="titlebar-logo" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="4" width="18" height="16" rx="4" fill="#007aff" opacity="0.12"/>
            <path d="M7 9.5h6M7 13h9M7 16.5h5" stroke="#007aff" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="17.5" cy="9.5" r="1.2" fill="#007aff"/>
          </svg>
          <span>日志管家</span>
        </div>
      </div>
      <div class="titlebar-controls">
        <button class="win-btn" id="winMin" title="最小化">
          <svg width="11" height="11" viewBox="0 0 12 12"><rect x="2" y="5.5" width="8" height="1" fill="currentColor"/></svg>
        </button>
        <button class="win-btn" id="winMax" title="最大化">
          <svg class="icon-max" width="11" height="11" viewBox="0 0 12 12"><rect x="2.5" y="2.5" width="7" height="7" stroke="currentColor" stroke-width="1" fill="none"/></svg>
          <svg class="icon-restore" width="11" height="11" viewBox="0 0 12 12"><rect x="2.5" y="4" width="5.5" height="5.5" stroke="currentColor" stroke-width="1" fill="none"/><rect x="4" y="2.5" width="5.5" height="1.5" stroke="currentColor" stroke-width="1" fill="none"/></svg>
        </button>
        <button class="win-btn win-close" id="winClose" title="关闭">
          <svg width="11" height="11" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div class="app-body">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <nav class="nav">
          <button class="nav-item active" data-view="log">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M4 5h16M4 10h16M4 15h10M4 20h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span class="nav-text"><span class="nav-label">日志查看</span><span class="nav-desc">实时跟踪与搜索</span></span>
          </button>
          <button class="nav-item" data-view="recent">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"/><path d="M12 8v4l2.5 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="nav-text"><span class="nav-label">最近打开</span><span class="nav-desc">历史文件记录</span></span>
          </button>
          <button class="nav-item" data-view="stats">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M5 20V10M12 20V4M19 20v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span class="nav-text"><span class="nav-label">统计分析</span><span class="nav-desc">级别分布与趋势</span></span>
          </button>
        </nav>
        <div class="sidebar-footer">
          <button class="afdian-link" id="afdianBtn" title="支持我们 · 爱发电">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.5-9.5-9C1 8.5 3 5 6.5 5c2 0 3.5 1.5 5.5 3.5C14 6.5 15.5 5 17.5 5 21 5 23 8.5 21.5 12c-2.5 4.5-9.5 9-9.5 9z" fill="#ff4d4f" opacity="0.85"/></svg>
            <span>支持我们</span>
          </button>
          <div class="sidebar-version" id="versionText">v1.0.0</div>
        </div>
      </aside>

      <!-- 主区 -->
      <main class="main">
        <!-- 顶栏 -->
        <div class="topbar">
          <div class="topbar-title">
            <h1 id="pageTitle">日志查看</h1>
            <p id="pageDesc">打开日志文件，实时跟踪、按级别过滤、全文搜索</p>
          </div>
          <div class="topbar-actions" id="topActions">
            <button class="ghost-btn" id="openBtn">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M4 6h7l2 2h7v10a1 1 0 01-1 1H4a1 1 0 01-1-1V7a1 1 0 011-1z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
              <span>打开文件</span>
            </button>
            <button class="ghost-btn active" id="tailBtn" title="实时跟踪文件变化（自动滚动到底部）">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 12h12M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span>实时跟踪</span>
            </button>
            <div class="action-divider"></div>
            <button class="ghost-btn" id="exportBtn" disabled>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 4v12M7 11l5 5 5-5M5 20h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span>导出</span>
            </button>
          </div>
        </div>

        <!-- 工具栏（仅日志视图显示） -->
        <div class="toolbar" id="toolbar">
          <div class="toolbar-row">
            <div class="search-box">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M16 16l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              <input type="text" id="searchInput" placeholder="搜索日志内容（Ctrl+F）…" spellcheck="false">
              <div class="search-nav">
                <button class="search-nav-btn" id="searchPrev" title="上一个匹配（Shift+Enter）" disabled>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M6 11l6-6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <span class="nav-count" id="searchCount">0 / 0</span>
                <button class="search-nav-btn" id="searchNext" title="下一个匹配（Enter）" disabled>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M6 13l6 6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
              </div>
            </div>
          </div>

          <div class="toolbar-row toolbar-row-between">
            <div class="level-chips" id="levelChips">
              <button class="chip active" data-level="TRACE"><span class="chip-dot" style="background:#8e8e93"></span>TRACE<span class="chip-count" data-count="TRACE">0</span></button>
              <button class="chip active" data-level="DEBUG"><span class="chip-dot" style="background:#5856d6"></span>DEBUG<span class="chip-count" data-count="DEBUG">0</span></button>
              <button class="chip active" data-level="INFO"><span class="chip-dot" style="background:#007aff"></span>INFO<span class="chip-count" data-count="INFO">0</span></button>
              <button class="chip active" data-level="WARN"><span class="chip-dot" style="background:#ff9500"></span>WARN<span class="chip-count" data-count="WARN">0</span></button>
              <button class="chip active" data-level="ERROR"><span class="chip-dot" style="background:#ff3b30"></span>ERROR<span class="chip-count" data-count="ERROR">0</span></button>
              <button class="chip active" data-level="FATAL"><span class="chip-dot" style="background:#af52de"></span>FATAL<span class="chip-count" data-count="FATAL">0</span></button>
            </div>
            <div class="toolbar-toggles">
              <div class="opt-toggle" id="wrapToggle" title="长行换行显示">
                <div class="toggle-switch"></div>
                <span>换行</span>
              </div>
              <div class="opt-toggle active" id="autoScrollToggle" title="新内容到达时自动滚动到底部">
                <div class="toggle-switch"></div>
                <span>自动滚动</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 内容区 -->
        <div class="content" id="content">
          <!-- 内容头部（文件信息栏，仅加载文件后显示） -->
          <div class="content-head" id="contentHead" hidden>
            <div class="content-head-left">
              <span class="content-head-label">当前文件</span>
              <span class="file-badge" id="fileBadge">—</span>
            </div>
            <div class="content-head-info">
              <span class="live-status" id="liveStatus"><span class="live-dot" id="liveDot"></span><span id="liveText">跟踪中</span></span>
              <span id="lineCountText">0 行</span>
              <span id="encodingText">UTF-8</span>
            </div>
          </div>

          <!-- 空状态 -->
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">
              <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M5 4h10l4 4v12a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M14 4v5h5M8 13h8M8 16h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <h2>打开一个日志文件开始</h2>
            <p>支持 .log / .txt 等文本日志，自动识别编码（UTF-8/GBK），实时跟踪文件变化，按级别过滤与全文搜索。也可将文件拖入此处。</p>
            <div class="empty-actions">
              <button class="primary-btn" id="emptyOpenBtn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M4 6h7l2 2h7v10a1 1 0 01-1 1H4a1 1 0 01-1-1V7a1 1 0 011-1z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
                <span>选择日志文件</span>
              </button>
            </div>
          </div>

          <!-- 日志列表（虚拟滚动） -->
          <div class="log-viewport" id="logViewport" hidden>
            <div class="log-spacer" id="logSpacer"></div>
            <div class="log-list" id="logList"></div>
          </div>

          <!-- 最近文件 -->
          <div class="recent-list" id="recentList" hidden style="padding:8px 4px;overflow-y:auto;flex:1"></div>

          <!-- 统计 -->
          <div class="stats-section" id="statsSection" hidden></div>
        </div>
      </main>
    </div>
  </div>

  <!-- 关于弹窗 -->
  <div class="modal-mask" id="aboutMask" hidden>
    <div class="modal">
      <div class="modal-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="18" height="16" rx="4" fill="#007aff" opacity="0.12"/>
          <path d="M7 9.5h6M7 13h9M7 16.5h5" stroke="#007aff" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="17.5" cy="9.5" r="1.2" fill="#007aff"/>
        </svg>
      </div>
      <h2>日志管家</h2>
      <div class="modal-version" id="aboutVersion">v1.0.0</div>
      <div class="modal-desc">
        本地优先的开发者日志查看工具。<br>
        实时跟踪 · 级别过滤 · 全文搜索 · 大文件支持。<br>
        所有数据本地处理，隐私优先。
      </div>
      <div class="modal-actions">
        <button class="primary-btn" id="aboutClose">知道了</button>
      </div>
      <div class="modal-footer">由 Trae + MiMo Code 协作打造</div>
    </div>
  </div>

  <script src="../core/log-core.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
