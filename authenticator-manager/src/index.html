<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>验证器</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 自定义标题栏 -->
  <header class="titlebar">
    <div class="titlebar-drag">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L4 5v6c0 5 3.5 9 8 11 4.5-2 8-6 8-11V5l-8-3z" fill="#007aff" />
            <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <span class="brand-name">验证器</span>
      </div>
    </div>
    <div class="titlebar-actions">
      <button class="win-btn" id="btn-settings" title="设置" aria-label="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.27.62.86 1.04 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button class="win-btn" id="btn-min" title="最小化" aria-label="最小化">
        <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="6.4" width="10" height="1.2" rx="0.6" fill="currentColor"/></svg>
      </button>
      <button class="win-btn win-btn-close" id="btn-close" title="隐藏到托盘" aria-label="隐藏">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <!-- 搜索 -->
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
    </svg>
    <input id="search" type="text" placeholder="搜索账户..." autocomplete="off" spellcheck="false" />
    <button id="btn-clear-search" class="clear-btn" title="清空" aria-label="清空" hidden>
      <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="6" fill="currentColor" opacity="0.4"/><path d="M3.5 3.5l5 5M8.5 3.5l-5 5" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- 账户列表 -->
  <main class="list" id="list" aria-label="账户列表">
    <!-- 动态渲染 -->
  </main>

  <!-- 空状态 -->
  <div class="empty" id="empty" hidden>
    <div class="empty-art" aria-hidden="true">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <circle cx="36" cy="36" r="34" fill="#f5f5f7"/>
        <path d="M36 16l-16 6v12c0 10 7 18 16 22 9-4 16-12 16-22V22l-16-6z" fill="#ffffff" stroke="#007aff" stroke-width="1.4"/>
        <path d="M29 36l5 5 9-9" stroke="#007aff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <h2>还没有账户</h2>
    <p>点击下方按钮添加你的第一个两步验证账户</p>
  </div>

  <!-- 浮动添加按钮 -->
  <button class="fab" id="btn-add" title="添加账户" aria-label="添加账户">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>

  <!-- 添加/编辑账户对话框 -->
  <div class="modal-mask" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h3 id="modal-title">添加账户</h3>
        <button class="win-btn" id="modal-close" aria-label="关闭">
          <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>
      <form id="account-form" class="modal-body" autocomplete="off">
        <input type="hidden" id="f-id" />
        <label class="field">
          <span class="field-label">发行方</span>
          <input id="f-issuer" type="text" placeholder="如 GitHub、Google" required maxlength="48" />
        </label>
        <label class="field">
          <span class="field-label">账户名</span>
          <input id="f-label" type="text" placeholder="如 alice@example.com" maxlength="80" />
        </label>
        <label class="field">
          <span class="field-label">密钥（Secret）</span>
          <input id="f-secret" type="text" placeholder="Base32 密钥，如 JBSWY3DPEHPK3PXP" required maxlength="128" />
          <span class="field-hint">支持 otpauth:// 链接粘贴，会自动解析</span>
        </label>
        <div class="field-row">
          <label class="field small">
            <span class="field-label">位数</span>
            <select id="f-digits">
              <option value="6">6 位</option>
              <option value="7">7 位</option>
              <option value="8">8 位</option>
            </select>
          </label>
          <label class="field small">
            <span class="field-label">周期(秒)</span>
            <input id="f-period" type="number" min="5" max="120" value="30" />
          </label>
          <label class="field small">
            <span class="field-label">算法</span>
            <select id="f-algo">
              <option value="SHA1">SHA1</option>
              <option value="SHA256">SHA256</option>
              <option value="SHA512">SHA512</option>
            </select>
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="modal-cancel">取消</button>
          <button type="submit" class="btn btn-primary" id="modal-save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 设置对话框 -->
  <div class="modal-mask" id="settings-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="modal-head">
        <h3 id="settings-title">设置</h3>
        <button class="win-btn" id="settings-close" aria-label="关闭">
          <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <label class="switch-row">
          <div>
            <div class="switch-title">失焦自动隐藏</div>
            <div class="switch-desc">窗口失去焦点时自动隐藏到托盘</div>
          </div>
          <input type="checkbox" id="set-autohide" class="switch" />
        </label>
        <label class="switch-row">
          <div>
            <div class="switch-title">复制后自动隐藏</div>
            <div class="switch-desc">复制验证码后短暂显示再隐藏</div>
          </div>
          <input type="checkbox" id="set-hide-copy" class="switch" />
        </label>
        <div class="switch-row stacked">
          <div>
            <div class="switch-title">全局热键</div>
            <div class="switch-desc">唤起 / 隐藏验证器窗口</div>
          </div>
          <input id="set-hotkey" type="text" class="hotkey-input" placeholder="CommandOrControl+Shift+A" />
        </div>
        <div class="backup-row">
          <button class="btn btn-ghost full" id="btn-export">导出加密备份</button>
          <button class="btn btn-ghost full" id="btn-import">导入加密备份</button>
        </div>
        <div class="modal-actions">
          <button class="btn btn-primary" id="settings-done">完成</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="renderer.js"></script>
</body>
</html>
