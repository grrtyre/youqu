<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; media-src 'self' blob:">
<title>番茄管家</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <!-- 顶栏 -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="13" r="8" fill="#007aff"/><path d="M12 5c0-1.5 1-3 3-3" stroke="#34c759" stroke-width="2" stroke-linecap="round"/><path d="M12 5c0-1.2.8-2.2 2-2.6" stroke="#34c759" stroke-width="1.6" stroke-linecap="round"/></svg></span>
      <span class="brand-name">番茄管家</span>
    </div>
    <div class="topbar-right">
      <div class="streak-badge" id="streakBadge" title="连续达标天数">
        <span class="streak-flame"><svg width="13" height="13" viewBox="0 0 24 24" fill="#ff9500"><path d="M12 2c0 3-2 4-2 7 0 2 1 3 2 3s2-1 2-3c1 1 2 2.5 2 5 0 3.3-2.7 6-6 6s-6-2.7-6-6c0-4 4-6 4-12z"/></svg></span>
        <span id="streakNum">0</span>
        <span class="streak-label">天连续</span>
      </div>
      <button class="icon-btn" id="settingsBtn" title="设置" aria-label="设置">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 13.5a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.56V20a2 2 0 0 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1H4a2 2 0 0 1 0-4h.09a1.7 1.7 0 0 0 1.56-1.11 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H10a1.7 1.7 0 0 0 1-1.56V4a2 2 0 0 1 4 0v.09a1.7 1.7 0 0 0 1 1.56 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V10a1.7 1.7 0 0 0 1.56 1H20a2 2 0 0 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </header>

  <main class="main">
    <!-- 左侧：任务与统计 -->
    <aside class="sidebar">
      <section class="card stat-card">
        <div class="stat-header">
          <h3>今日进度</h3>
          <span class="stat-date" id="todayDate"></span>
        </div>
        <div class="stat-row">
          <div class="stat-big">
            <span class="stat-num" id="todayCount">0</span>
            <span class="stat-unit">/ <span id="todayGoal">8</span></span>
          </div>
          <div class="stat-progress">
            <div class="stat-progress-bar"><div class="stat-progress-fill" id="todayBar"></div></div>
            <span class="stat-pct" id="todayPct">0%</span>
          </div>
        </div>
        <div class="stat-mini">
          <div><span id="todayMinutes">0</span> 分钟专注</div>
          <div>本周 <span id="weekCount">0</span> 🍅</div>
          <div>累计 <span id="totalMinutes">0</span> 小时</div>
        </div>
      </section>

      <section class="card task-card">
        <div class="task-header">
          <h3>任务清单</h3>
          <span class="task-count" id="taskCount">0</span>
        </div>
        <div class="task-add">
          <input type="text" id="taskInput" placeholder="添加一个任务，回车确认…" maxlength="80" aria-label="任务名称">
          <span class="task-counter" id="taskCounter">0/80</span>
          <input type="number" id="taskEstimate" min="1" max="20" value="1" title="预计番茄数" aria-label="预计番茄数">
          <button id="taskAddBtn" class="mini-btn primary" title="添加" aria-label="添加任务">＋</button>
        </div>
        <ul class="task-list" id="taskList"></ul>
        <div class="task-footer" id="taskFooter"></div>
      </section>
    </aside>

    <!-- 中间：计时器 -->
    <section class="timer-area">
      <div class="phase-tabs" id="phaseTabs">
        <button class="phase-tab active working" data-phase="working">专注</button>
        <button class="phase-tab short_break" data-phase="short_break">短休息</button>
        <button class="phase-tab long_break" data-phase="long_break">长休息</button>
      </div>

      <div class="timer-ring-wrap">
        <div class="ring-ripple" id="ringRipple"></div>
        <svg class="timer-ring" viewBox="0 0 320 320" preserveAspectRatio="xMidYMid meet">
          <circle class="ring-track" cx="160" cy="160" r="140"/>
          <circle class="ring-progress" id="ringProgress" cx="160" cy="160" r="140"/>
        </svg>
        <div class="timer-center">
          <div class="timer-time" id="timerTime">25:00</div>
          <div class="timer-phase" id="timerPhase">准备开始</div>
          <div class="timer-cycle" id="timerCycle"></div>
          <div class="cycle-label" id="cycleLabel">第 1 轮 · 共 4 轮</div>
        </div>
      </div>

      <div class="timer-controls">
        <button class="ctrl-btn ctrl-secondary" id="resetBtn" title="重置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 1 0 3-6.7L3 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 4v4h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="ctrl-btn ctrl-primary" id="startBtn" title="开始/暂停">
          <svg id="startIcon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-secondary" id="skipBtn" title="跳过">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 5l9 7-9 7V5z" fill="currentColor"/><path d="M18 5v14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="ctrl-label" id="startText">开始专注</div>
      <div class="kbd-hint"><kbd>空格</kbd>开始/暂停<span class="kbd-sep">·</span><kbd>R</kbd>重置<span class="kbd-sep">·</span><kbd>S</kbd>跳过<span class="kbd-sep">·</span><kbd>1/2/3</kbd>切换阶段</div>

      <!-- 当前任务 -->
      <div class="current-task" id="currentTask">
        <span class="current-task-label">当前任务</span>
        <span class="current-task-name" id="currentTaskName">未选择任务</span>
      </div>

      <!-- 本周柱状图 -->
      <div class="week-section">
        <div class="week-title">
          <span>本周专注</span>
          <span class="week-total" id="weekTotal"></span>
        </div>
        <div class="week-chart" id="weekChart"></div>
      </div>
    </section>
  </main>

  <!-- 设置弹层 -->
  <div class="modal-mask" id="settingsMask">
    <div class="modal">
      <div class="modal-head">
        <h3>设置</h3>
        <button class="icon-btn" id="settingsClose" aria-label="关闭设置">×</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <div class="group-title">时长配置</div>
          <div class="setting-row">
            <label>专注时长（分钟）</label>
            <input type="number" id="cfgWork" min="1" max="90" value="25">
          </div>
          <div class="setting-row">
            <label>短休息（分钟）</label>
            <input type="number" id="cfgShort" min="1" max="30" value="5">
          </div>
          <div class="setting-row">
            <label>长休息（分钟）</label>
            <input type="number" id="cfgLong" min="1" max="60" value="15">
          </div>
          <div class="setting-row">
            <label>长休息间隔（个）</label>
            <input type="number" id="cfgInterval" min="2" max="12" value="4">
          </div>
          <div class="setting-row">
            <label>每日目标（番茄数）</label>
            <input type="number" id="cfgGoal" min="1" max="30" value="8">
          </div>
        </div>
        <div class="setting-group">
          <div class="group-title">行为模式</div>
          <div class="setting-row setting-switch">
            <label>严格模式（不可跳过休息）</label>
            <input type="checkbox" id="cfgStrict">
          </div>
          <div class="setting-row setting-switch">
            <label>自动开始休息</label>
            <input type="checkbox" id="cfgAutoBreak" checked>
          </div>
          <div class="setting-row setting-switch">
            <label>休息后自动开始专注</label>
            <input type="checkbox" id="cfgAutoWork">
          </div>
        </div>
        <div class="setting-group">
          <div class="group-title">声音</div>
          <div class="setting-row setting-switch">
            <label>提示音</label>
            <input type="checkbox" id="cfgSound" checked>
          </div>
          <div class="setting-row setting-switch">
            <label>白噪音背景音</label>
            <input type="checkbox" id="cfgNoise">
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="mini-btn" id="exportBtn">导出数据</button>
        <button class="mini-btn" id="importBtn">导入数据</button>
        <input type="file" id="importFile" accept="application/json" style="display:none">
        <span class="modal-foot-spacer"></span>
        <button class="mini-btn" id="settingsCancel">取消</button>
        <button class="mini-btn primary" id="settingsSave">保存</button>
      </div>
      <div class="modal-love">
        <a href="https://www.ifdian.net/a/giquwei" target="_blank" rel="noopener">☕ 支持我们 · 爱发电</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>
<script src="renderer.js"></script>
</body>
</html>
