<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>置顶管家</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 顶部标题区 -->
    <header class="header">
      <div class="title-wrap">
        <div class="logo">
          <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
            <rect x="1" y="1" width="32" height="32" rx="9" fill="#ffffff" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
            <path d="M17 7.5c-3.2 0-5.8 2.5-5.8 5.6 0 2.2 1.3 3.7 2.4 4.6.5.4.7.8.7 1.3v.7a1.4 1.4 0 0 0 1.4 1.4h2.6a1.4 1.4 0 0 0 1.4-1.4v-.7c0-.5.2-.9.7-1.3 1.1-.9 2.4-2.4 2.4-4.6 0-3.1-2.6-5.6-5.8-5.6z" fill="#007aff"/>
            <rect x="14.2" y="22.5" width="5.6" height="1.8" rx="0.9" fill="#007aff"/>
            <rect x="15" y="25.6" width="4" height="2.4" rx="1" fill="#007aff"/>
          </svg>
        </div>
        <div class="title-text">
          <h1>置顶管家</h1>
          <p>让任意窗口始终置顶 · 隐私优先 · 纯本地运行</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="hotkey-pill" title="全局快捷键">
          <span class="kbd">Ctrl</span><span class="plus">+</span><span class="kbd">Alt</span><span class="plus">+</span><span class="kbd">T</span>
        </div>
        <button id="btnTopFg" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5l1.9 4.2 4.6.5-3.4 3.1.9 4.5L8 11.6 4 13.8l.9-4.5L1.5 6.2l4.6-.5L8 1.5z" fill="currentColor"/></svg>
          置顶当前窗口
        </button>
      </div>
    </header>

    <!-- 工具栏 -->
    <section class="toolbar">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#86868b" stroke-width="1.6"/><path d="M11 11l3 3" stroke="#86868b" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input id="search" type="text" placeholder="搜索窗口标题或程序名…" autocomplete="off" />
      </div>
      <div class="toolbar-right">
        <label class="segment">
          <input type="checkbox" id="autoRefresh" checked />
          <span>自动刷新</span>
        </label>
        <button id="btnRefresh" class="btn-ghost" title="立即刷新">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9M13.5 2v3h-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          刷新
        </button>
        <span id="count" class="count-badge">0 个窗口</span>
      </div>
    </section>

    <!-- 主体：窗口列表 + 侧边规则面板 -->
    <main class="content">
      <div class="list-wrap" id="listWrap">
        <div id="list" class="list"></div>
        <div id="empty" class="empty hidden">
          <div class="empty-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="6" y="9" width="36" height="26" rx="4" stroke="#d2d2d7" stroke-width="2"/><path d="M14 39h20" stroke="#d2d2d7" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <p class="empty-title">没有可显示的窗口</p>
          <p class="empty-desc">桥接进程正在启动，或当前没有可见的顶层窗口</p>
        </div>
        <div id="loading" class="empty">
          <div class="spinner"></div>
          <p class="empty-desc">正在初始化窗口桥接…</p>
        </div>
      </div>

      <!-- 侧栏：概览 + 规则 + 提示 -->
      <aside class="side">
        <div class="card stat-card">
          <h2>概览</h2>
          <div class="stat-grid">
            <div class="stat">
              <div class="stat-num" id="statTotal">0</div>
              <div class="stat-label">窗口总数</div>
            </div>
            <div class="stat">
              <div class="stat-num" id="statTop">0</div>
              <div class="stat-label">已置顶</div>
            </div>
          </div>
          <div class="stat-row">
            <span class="stat-row-text">自动置顶</span>
            <label class="switch">
              <input type="checkbox" id="autoPinSwitch" />
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="card rules-card">
          <h2>自动置顶规则</h2>
          <p class="rules-desc">命中规则的窗口自动置顶</p>
          <div class="rules-add">
            <input id="ruleInput" type="text" placeholder="程序名，如 notepad" autocomplete="off" />
            <button id="btnAddRule" class="btn-mini">添加</button>
          </div>
          <div id="ruleList" class="rule-list">
            <div class="rule-empty">暂无规则</div>
          </div>
        </div>

        <div class="card tip-card">
          <div class="tip">
            <span class="tip-dot"></span>
            <span>点 <b>★</b> 把程序加入自动置顶规则；按 <b>Ctrl+Alt+T</b> 置顶前台窗口；关闭窗口驻留托盘。</span>
          </div>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <span id="status">就绪</span>
      <span class="dot">·</span>
      <span>数据保存在本地，不上传任何信息</span>
    </footer>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
