<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重命名管家</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 自定义标题栏 -->
  <header class="titlebar">
    <div class="titlebar-drag">
      <div class="app-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="1.5" y="1.5" width="15" height="15" rx="3.5" fill="#007aff"/>
          <path d="M5 7h8M5 9.5h8M5 12h5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="app-title">重命名管家</span>
    </div>
    <div class="titlebar-actions">
      <button class="tb-btn" id="btn-afdian" title="支持我们">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M7 12.5l-1-1C2.5 8.5 1 7 1 5.2 1 3.7 2.2 2.5 3.7 2.5c.9 0 1.7.4 2.3 1.1L7 4.7l1-1.1c.6-.7 1.4-1.1 2.3-1.1C11.8 2.5 13 3.7 13 5.2c0 1.8-1.5 3.3-5 6.3l-1 1z"/></svg>
        <span>爱发电</span>
      </button>
      <button class="tb-btn win-btn" id="btn-min" title="最小化">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M0 5h10" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button class="tb-btn win-btn" id="btn-max" title="最大化">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button class="tb-btn win-btn close" id="btn-close" title="关闭">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M0 0l10 10M10 0L0 10" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </header>

  <!-- 主体 -->
  <main class="layout">
    <!-- 左侧：规则面板 -->
    <aside class="rules-panel" id="rules-panel">
      <div class="panel-header">
        <h2>重命名规则</h2>
        <button class="btn-link" id="btn-add-rule">+ 添加规则</button>
      </div>

      <div class="rules-list" id="rules-list">
        <!-- 规则卡片动态生成 -->
        <div class="empty-state" id="rules-empty">
          <p>还没有规则</p>
          <span>点击上方"添加规则"开始</span>
        </div>
      </div>

      <!-- 预设管理 -->
      <div class="preset-section">
        <div class="preset-header">
          <span class="preset-title">预设</span>
          <button class="btn-link" id="btn-save-preset">保存当前为预设</button>
        </div>
        <div class="preset-list" id="preset-list">
          <div class="preset-empty">暂无预设</div>
        </div>
      </div>
    </aside>

    <!-- 右侧：文件列表 -->
    <section class="files-panel">
      <!-- 工具栏 -->
      <div class="files-toolbar">
        <div class="toolbar-left">
          <button class="btn-primary-sm" id="btn-add-files">+ 添加文件</button>
          <button class="btn-primary-sm" id="btn-add-folder">+ 添加文件夹</button>
          <span class="file-count" id="file-count">0 个文件</span>
        </div>
        <div class="toolbar-right">
          <label class="checkbox-line">
            <input type="checkbox" id="chk-recursive" checked>
            <span>递归子目录</span>
          </label>
          <button class="btn-link-danger" id="btn-clear-files">清空</button>
        </div>
      </div>

      <!-- 拖放区 + 文件表格 -->
      <div class="files-container" id="files-container">
        <div class="drop-zone" id="drop-zone">
          <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
            <rect x="6" y="10" width="44" height="36" rx="4" fill="#f0f0f3" stroke="#d2d2d7" stroke-width="1.5"/>
            <path d="M28 22v14M21 29l7-7 7 7" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p class="drop-title">拖入文件或文件夹</p>
          <span class="drop-hint">或点击上方按钮选择</span>
        </div>

        <div class="file-table-wrap" id="file-table-wrap" style="display:none;">
          <table class="file-table">
            <thead>
              <tr>
                <th class="col-idx">#</th>
                <th class="col-old">原文件名</th>
                <th class="col-arrow">→</th>
                <th class="col-new">新文件名</th>
                <th class="col-status">状态</th>
              </tr>
            </thead>
            <tbody id="file-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- 底部操作栏 -->
      <div class="action-bar">
        <div class="action-info" id="action-info">
          <span class="info-badge" id="info-change">0 项变更</span>
          <span class="info-badge warn" id="info-conflict" style="display:none;">0 项冲突</span>
        </div>
        <div class="action-buttons">
          <button class="btn-secondary" id="btn-undo" disabled>撤销</button>
          <button class="btn-primary" id="btn-apply" disabled>应用重命名</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <script src="renderer.js"></script>
</body>
</html>
