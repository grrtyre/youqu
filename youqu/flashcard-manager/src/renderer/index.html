<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" />
  <title>闪卡记忆管家</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 顶栏 -->
    <header class="topbar">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <rect x="3" y="5" width="14" height="16" rx="2.5" fill="#007aff" opacity="0.18"/>
          <rect x="7" y="3" width="14" height="16" rx="2.5" fill="#007aff"/>
          <path d="M11 9h6M11 12.5h6M11 16h4" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span class="brand-name">闪卡记忆管家</span>
      </div>
      <div class="topbar-actions">
        <button class="btn-ghost" id="btn-import" title="导入备份">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>导入</span>
        </button>
        <button class="btn-ghost" id="btn-export" title="导出备份">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 15V3m0 0l-4 4m4-4l4 4M5 21h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>导出</span>
        </button>
      </div>
    </header>

    <div class="body">
      <!-- 侧栏：卡组 -->
      <aside class="sidebar">
        <div class="sidebar-head">
          <span class="sidebar-title">卡组</span>
          <button class="btn-add" id="btn-new-deck" title="新建卡组">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <ul class="deck-list" id="deck-list"></ul>
        <div class="sidebar-foot">
          <div class="total-card" id="total-card"></div>
        </div>
      </aside>

      <!-- 主区 -->
      <main class="main" id="main">
        <!-- 由 app.js 动态渲染 -->
      </main>
    </div>
  </div>

  <!-- 通用对话框 -->
  <div class="modal-mask" id="modal-mask" hidden>
    <div class="modal" id="modal"></div>
  </div>

  <!-- 轻提示 -->
  <div class="toast" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
