<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>框选识别区域</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; cursor:crosshair; }
  #bg { position:absolute; inset:0; width:100%; height:100%; object-fit:fill; }
  #mask { position:absolute; inset:0; background:rgba(0,0,0,0.45); }
  #sel { position:absolute; border:1.5px solid #007aff; box-shadow:0 0 0 9999px rgba(0,0,0,0.45); background:rgba(0,122,255,0.04); display:none; }
  #tip { position:fixed; top:24px; left:50%; transform:translateX(-50%); color:#fff; font:500 14px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:rgba(0,0,0,0.55); padding:8px 16px; border-radius:10px; backdrop-filter:blur(8px); }
  #size { position:absolute; display:none; color:#fff; font:500 12px -apple-system,"PingFang SC",sans-serif; background:#007aff; padding:3px 8px; border-radius:6px; pointer-events:none; white-space:nowrap; }
  .esc-hint { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.6); font:400 12px -apple-system,"PingFang SC",sans-serif; }
</style>
</head>
<body>
  <img id="bg" alt="">
  <div id="sel"></div>
  <div id="size"></div>
  <div id="tip">拖动鼠标框选要识别的区域 · 按 Esc 取消</div>
  <div class="esc-hint">识字管家 · 屏幕截图识别</div>
<script>
(function(){
  const bg = document.getElementById('bg');
  const sel = document.getElementById('sel');
  const sizeBox = document.getElementById('size');
  let bgData = null;
  let start = null;
  let dragging = false;

  window.ocr.onCaptureBg((data) => {
    bgData = data;
    bg.src = data.dataUrl;
  });

  function getPos(e){ return { x:e.clientX, y:e.clientY }; }

  document.addEventListener('mousedown', (e) => {
    if(e.button !== 0) return;
    start = getPos(e);
    dragging = true;
    sel.style.display = 'block';
    sel.style.left = start.x + 'px';
    sel.style.top = start.y + 'px';
    sel.style.width = '0px';
    sel.style.height = '0px';
    sizeBox.style.display = 'block';
  });

  document.addEventListener('mousemove', (e) => {
    if(!dragging) return;
    const p = getPos(e);
    const x = Math.min(start.x, p.x);
    const y = Math.min(start.y, p.y);
    const w = Math.abs(p.x - start.x);
    const h = Math.abs(p.y - start.y);
    sel.style.left = x + 'px';
    sel.style.top = y + 'px';
    sel.style.width = w + 'px';
    sel.style.height = h + 'px';
    // 物理像素尺寸
    const scale = bgData ? bgData.scale : 1;
    sizeBox.textContent = Math.round(w*scale) + ' × ' + Math.round(h*scale);
    sizeBox.style.left = (x + w + 8) + 'px';
    sizeBox.style.top = (y + h + 8) + 'px';
  });

  document.addEventListener('mouseup', (e) => {
    if(!dragging) return;
    dragging = false;
    const p = getPos(e);
    const x = Math.min(start.x, p.x);
    const y = Math.min(start.y, p.y);
    const w = Math.abs(p.x - start.x);
    const h = Math.abs(p.y - start.y);
    if(w < 4 || h < 4){
      sel.style.display = 'none';
      sizeBox.style.display = 'none';
      return;
    }
    const scale = bgData ? bgData.scale : 1;
    // 转为物理像素坐标，供主进程 crop 使用
    const rect = {
      x: Math.round(x * scale),
      y: Math.round(y * scale),
      width: Math.round(w * scale),
      height: Math.round(h * scale)
    };
    window.ocr.sendSelected(rect);
  });

  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape'){
      window.ocr.sendCancelled();
    }
  });
  document.addEventListener('contextmenu', (e) => { e.preventDefault(); window.ocr.sendCancelled(); });
})();
</script>
</body>
</html>
