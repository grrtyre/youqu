<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>倒计时管家</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 顶栏 -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"></circle>
          <polyline points="12 7 12 12 15 14"></polyline>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-title">倒计时管家</div>
        <div class="brand-sub" id="todayLabel">—</div>
      </div>
    </div>
    <div class="topbar-actions">
      <div class="search-box">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="searchInput" type="text" placeholder="搜索事件…" />
      </div>
      <select id="categoryFilter" class="select" title="按分类筛选">
        <option value="all">全部分类</option>
        <option value="life">生活</option>
        <option value="work">工作</option>
        <option value="study">学习</option>
        <option value="anniversary">纪念日</option>
        <option value="festival">节日</option>
        <option value="other">其他</option>
      </select>
      <button class="icon-btn" id="importBtn" title="导入">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
      </button>
      <button class="icon-btn" id="exportBtn" title="导出">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
      </button>
      <button class="primary-btn" id="addBtn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        新建事件
      </button>
    </div>
  </header>

  <!-- 主体 -->
  <main class="main">
    <!-- Hero：最近的事件 -->
    <section class="hero" id="hero">
      <div class="hero-content">
        <div class="hero-label" id="heroLabel">最近的事件</div>
        <div class="hero-title" id="heroTitle">—</div>
        <div class="hero-date" id="heroDate">—</div>
        <div class="hero-note" id="heroNote"></div>
      </div>
      <div class="hero-number" id="heroNumber">—</div>
    </section>

    <!-- 筛选条 -->
    <div class="filter-bar">
      <div class="tabs" id="statusTabs">
        <button class="tab active" data-status="all">全部</button>
        <button class="tab" data-status="upcoming">即将到来</button>
        <button class="tab" data-status="past">已过去</button>
      </div>
      <div class="count-hint" id="countHint">共 0 个事件</div>
    </div>

    <!-- 事件网格 -->
    <section class="grid" id="grid"></section>

    <!-- 空状态 -->
    <div class="empty" id="emptyState" style="display:none;">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="3"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
      </div>
      <div class="empty-title">还没有事件</div>
      <div class="empty-sub">点击右上角「新建事件」，开始记录你的重要日子</div>
    </div>
  </main>

  <!-- 底栏 -->
  <footer class="footer">
    <span class="footer-text">本地存储 · 数据不会离开你的电脑</span>
    <span class="footer-meta" id="footerMeta">倒计时管家 v1.0.0</span>
    <a class="afdian-link" id="afdianLink">支持我们 ☕ 爱发电</a>
  </footer>

  <!-- 新建/编辑 弹窗 -->
  <div class="modal-mask" id="modalMask">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">新建事件</div>
        <button class="icon-btn" id="modalCloseBtn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label>事件名称</label>
          <input type="text" id="fTitle" placeholder="如：生日、考试、旅行…" maxlength="60" />
        </div>
        <div class="form-row form-row-2">
          <div>
            <label>日期</label>
            <input type="date" id="fDate" />
          </div>
          <div>
            <label>历法</label>
            <select id="fCalendar" class="select">
              <option value="solar">公历</option>
              <option value="lunar">农历</option>
            </select>
          </div>
        </div>
        <div class="form-row form-row-2">
          <div>
            <label>重复</label>
            <select id="fRepeat" class="select">
              <option value="none">不重复</option>
              <option value="yearly">每年重复</option>
            </select>
          </div>
          <div>
            <label>分类</label>
            <select id="fCategory" class="select">
              <option value="life">生活</option>
              <option value="work">工作</option>
              <option value="study">学习</option>
              <option value="anniversary">纪念日</option>
              <option value="festival">节日</option>
              <option value="other">其他</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>颜色标签</label>
          <div class="color-picker" id="colorPicker">
            <span class="color-dot active" data-color="#007aff" style="background:#007aff"></span>
            <span class="color-dot" data-color="#ff3b30" style="background:#ff3b30"></span>
            <span class="color-dot" data-color="#ff9500" style="background:#ff9500"></span>
            <span class="color-dot" data-color="#34c759" style="background:#34c759"></span>
            <span class="color-dot" data-color="#af52de" style="background:#af52de"></span>
            <span class="color-dot" data-color="#ff2d55" style="background:#ff2d55"></span>
            <span class="color-dot" data-color="#5ac8fa" style="background:#5ac8fa"></span>
          </div>
        </div>
        <div class="form-row">
          <label>备注</label>
          <textarea id="fNote" placeholder="写点什么（可选）" maxlength="200" rows="2"></textarea>
        </div>
        <div class="form-row form-row-check">
          <label class="check-label">
            <input type="checkbox" id="fPinned" />
            <span>置顶显示</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="ghost-btn" id="deleteBtn" style="display:none;">删除</button>
        <div class="footer-spacer"></div>
        <button class="ghost-btn" id="cancelBtn">取消</button>
        <button class="primary-btn" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="renderer.js"></script>
</body>
</html>
