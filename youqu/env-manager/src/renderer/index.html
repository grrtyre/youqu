<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>环境变量管家</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 顶部栏 -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="2.5" y="4" width="19" height="16" rx="3" fill="#007aff"/>
            <path d="M6 9h12M6 13h12M6 17h7" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="18" cy="17" r="1.6" fill="#fff"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>环境变量管家</h1>
          <span class="brand-sub">Windows 环境变量可视化管理 · 纯本地隐私优先</span>
        </div>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="#86868b" stroke-width="2"/>
          <path d="M21 21l-4-4" stroke="#86868b" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" class="search-input" type="text" placeholder="搜索变量名或值…" autocomplete="off" />
      </div>

      <div class="actions">
        <button class="btn btn-ghost" id="refreshBtn" title="刷新">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 0114-5.3L20 8M20 4v4h-4M20 12a8 8 0 01-14 5.3L4 16M4 20v-4h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>刷新</span>
        </button>
        <button class="btn btn-ghost" id="backupBtn" title="导出备份">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 17v2a2 2 0 002 2h10a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>备份</span>
        </button>
        <button class="btn btn-ghost" id="restoreBtn" title="从备份恢复">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 15V3m0 0L8 7m4-4l4 4M5 17v2a2 2 0 002 2h10a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>恢复</span>
        </button>
        <button class="btn btn-primary" id="newBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>新建变量</span>
        </button>
      </div>
    </header>

    <!-- 管理员提示条 -->
    <div id="adminBanner" class="banner banner-warn hidden">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 9v4m0 4h.01M10.3 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.7 3.86a2 2 0 00-3.4 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>当前以普通权限运行，系统变量为只读。编辑系统变量需要管理员权限。</span>
      <button class="btn btn-mini" id="relaunchAdminBtn">以管理员重启</button>
    </div>

    <!-- 标签切换 -->
    <div class="tabs">
      <button class="tab active" data-scope="user">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M4 21a8 8 0 0116 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>用户变量</span>
        <span class="tab-count" id="userCount">0</span>
      </button>
      <button class="tab" data-scope="system">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 20h8M12 16v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>系统变量</span>
        <span class="tab-count" id="systemCount">0</span>
      </button>
    </div>

    <!-- 主内容 -->
    <main class="content">
      <div class="table-card">
        <div class="table-head">
          <div class="col-name">变量名</div>
          <div class="col-type">类型</div>
          <div class="col-value">值</div>
          <div class="col-ops">操作</div>
        </div>
        <div id="tableBody" class="table-body">
          <div class="empty">
            <div class="empty-spin"></div>
            <p>正在加载环境变量…</p>
          </div>
        </div>
      </div>

      <div class="footer">
        <span>环境变量管家 v1.0.0 · MIT License</span>
        <a id="afdianLink" class="afdian">支持我们 → 爱发电</a>
      </div>
    </main>
  </div>

  <!-- 编辑变量模态框 -->
  <div id="editModal" class="modal-mask hidden">
    <div class="modal">
      <div class="modal-head">
        <h2 id="editTitle">新建变量</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span class="field-label">变量名</span>
          <input id="editName" type="text" placeholder="例如 JAVA_HOME" autocomplete="off" />
          <span class="field-hint" id="editNameHint"></span>
        </label>
        <label class="field">
          <span class="field-label">变量值</span>
          <textarea id="editValue" rows="4" placeholder="变量值（支持 %VAR% 引用，将自动使用可扩展类型）"></textarea>
        </label>
        <div class="field-row">
          <label class="checkbox">
            <input id="editExpand" type="checkbox" />
            <span>使用可扩展类型 (REG_EXPAND_SZ)</span>
          </label>
          <span class="field-hint-inline" id="expandHint">含 %...% 引用时建议勾选</span>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close>取消</button>
        <button class="btn btn-primary" id="editSave">保存</button>
      </div>
    </div>
  </div>

  <!-- PATH 可视化编辑器 -->
  <div id="pathModal" class="modal-mask hidden">
    <div class="modal modal-lg">
      <div class="modal-head">
        <h2>PATH 可视化编辑 · <span id="pathScopeLabel">用户变量</span></h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <div class="modal-body">
        <div class="path-toolbar">
          <input id="pathNewInput" type="text" placeholder="输入新路径，回车添加（如 C:\Tools\bin）" autocomplete="off" />
          <button class="btn btn-primary btn-sm" id="pathAddBtn">添加</button>
        </div>
        <div class="path-hint">
          <span>上下拖动调整顺序 · 删除会即时生效 · 空段会以红色标出便于发现拼写错误</span>
        </div>
        <div id="pathList" class="path-list"></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close>关闭</button>
        <button class="btn btn-primary" id="pathSaveBtn">保存 PATH</button>
      </div>
    </div>
  </div>

  <!-- 恢复备份预览 -->
  <div id="restoreModal" class="modal-mask hidden">
    <div class="modal modal-lg">
      <div class="modal-head">
        <h2>从备份恢复</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <div class="modal-body">
        <div id="restoreSummary" class="restore-summary"></div>
        <div class="restore-section">
          <div class="restore-section-title">
            <label class="checkbox">
              <input id="restoreUserChk" type="checkbox" checked />
              <span><strong id="restoreUserTitle">恢复用户变量</strong></span>
            </label>
          </div>
          <div id="restoreUserDiff" class="diff-list"></div>
        </div>
        <div class="restore-section">
          <div class="restore-section-title">
            <label class="checkbox">
              <input id="restoreSystemChk" type="checkbox" />
              <span><strong id="restoreSystemTitle">恢复系统变量（需管理员）</strong></span>
            </label>
          </div>
          <div id="restoreSystemDiff" class="diff-list"></div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close>取消</button>
        <button class="btn btn-primary" id="restoreApplyBtn">执行恢复</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="renderer.js"></script>
</body>
</html>
