<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: blob:;" />
  <title>速览管家</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 自定义标题栏 -->
  <header class="titlebar" id="titlebar">
    <div class="traffic-lights">
      <button class="tl tl-close" id="btn-close" title="关闭"></button>
      <button class="tl tl-min" id="btn-min" title="最小化"></button>
      <button class="tl tl-max" id="btn-max" title="最大化"></button>
    </div>
    <div class="title-text" id="title-text">速览管家</div>
    <div class="title-actions">
      <button class="icon-btn" id="btn-open" title="打开文件">
        <svg viewBox="0 0 16 16" width="16" height="16"><path fill="currentColor" d="M3 4a1 1 0 0 1 1-1h3l1.5 1.5H12a1 1 0 0 1 1 1V12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4Z"/></svg>
      </button>
      <button class="icon-btn" id="btn-history" title="历史记录">
        <svg viewBox="0 0 16 16" width="16" height="16"><path fill="currentColor" d="M8 1a7 7 0 1 0 6.326 4h-1.13A6 6 0 1 1 8 2v2l3-2.5L8 0v1Z"/><path fill="currentColor" d="M8 4v4l3 1.5.5-.9L9 7V4H8Z"/></svg>
      </button>
    </div>
  </header>

  <main class="content" id="content">
    <!-- 欢迎页 -->
    <section class="welcome" id="welcome">
      <div class="welcome-card">
        <div class="logo">
          <svg viewBox="0 0 48 48" width="44" height="44">
            <defs>
              <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#5ac8fa"/>
                <stop offset="100%" stop-color="#007aff"/>
              </linearGradient>
            </defs>
            <rect x="6" y="6" width="36" height="36" rx="10" fill="url(#lg)"/>
            <path fill="#fff" d="M16 16h16v2.4H16zM16 21h16v2.4H16zM16 26h10v2.4H16z" opacity="0.95"/>
            <circle cx="30" cy="30" r="5.5" fill="#fff" opacity="0.96"/>
            <circle cx="30" cy="30" r="3.4" fill="url(#lg)"/>
            <line x1="33.5" y1="33.5" x2="37" y2="37" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.96"/>
          </svg>
        </div>
        <h1>速览管家</h1>
        <p class="tagline">极速文件预览，按需唤起 · 选中即看，看完即走</p>
        <div class="hotkey-row">
          按 <kbd class="key">Alt</kbd> <span class="plus">+</span> <kbd class="key">Q</kbd> 唤起
        </div>
        <ul class="hints">
          <li>在文件资源管理器选中文件后唤起，自动预览</li>
          <li>支持图片、视频、音频、PDF、代码、Markdown、文本</li>
          <li>拖拽文件到窗口、点击右上角文件夹、复制路径都可预览</li>
        </ul>
        <div class="dropzone" id="dropzone">
          <div class="drop-icons">
            <svg class="ft-icon" viewBox="0 0 24 24" width="26" height="26"><rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="10" r="1.6" fill="currentColor"/><path d="M5 17l4-4 3 3 3-3 4 4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <svg class="ft-icon" viewBox="0 0 24 24" width="26" height="26"><rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M10 9l5 3-5 3V9z" fill="currentColor"/></svg>
            <svg class="ft-icon" viewBox="0 0 24 24" width="26" height="26"><path d="M9 18V6l10-2v12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="18" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="17" cy="16" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            <svg class="ft-icon" viewBox="0 0 24 24" width="26" height="26"><path d="M6 3h8l4 4v14H6V3z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M14 3v4h4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M8 12h8M8 15h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <svg class="ft-icon" viewBox="0 0 24 24" width="26" height="26"><path d="M8 4l-4 4 4 4M4 8h12a4 4 0 0 1 0 8h-1" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 20l4-4-4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="drop-main">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" d="M12 4l5 5h-3v6h-4V9H7l5-5Zm-7 14h14v2H5v-2Z"/></svg>
            <span>拖拽文件到这里，或点击选择</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 预览区 -->
    <section class="preview" id="preview" hidden>
      <div class="preview-stage" id="stage">
        <!-- 渲染内容动态注入 -->
      </div>
      <footer class="meta-bar" id="meta-bar">
        <div class="meta-name" id="meta-name"></div>
        <div class="meta-info" id="meta-info"></div>
        <div class="meta-actions">
          <button class="ghost-btn" id="btn-folder" title="在文件夹中显示">显示位置</button>
          <button class="ghost-btn" id="btn-open-ext" title="用系统应用打开">系统打开</button>
          <button class="ghost-btn" id="btn-copy-path" title="复制路径">复制路径</button>
        </div>
      </footer>
    </section>

    <!-- 历史抽屉 -->
    <aside class="history-panel" id="history-panel" hidden>
      <div class="history-head">
        <span>历史记录</span>
        <button class="ghost-btn sm" id="btn-clear-history">清空</button>
      </div>
      <ul class="history-list" id="history-list"></ul>
    </aside>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="renderer.js"></script>
</body>
</html>
