<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;" />
  <title>习惯管家</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 顶部栏 -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M5 12.5L10 17.5L19 6.5" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-title">习惯管家</div>
          <div class="brand-sub" id="todayLabel">今日</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="btn-ghost" id="btnImport" title="从 JSON 导入">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 3v10m0 0l-3.5-3.5M12 13l3.5-3.5M5 17v2a2 2 0 002 2h10a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>导入</span>
        </button>
        <button class="btn-ghost" id="btnExport" title="导出为 JSON">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 21V11m0 0l-3.5 3.5M12 11l3.5 3.5M5 7V5a2 2 0 012-2h10a2 2 0 012 2v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>导出</span>
        </button>
      </div>
    </header>

    <div class="layout">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="sidebar-title">我的习惯</div>
          <button class="btn-add" id="btnAdd" title="新建习惯">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="habit-list" id="habitList">
          <!-- 习惯项动态渲染 -->
        </div>
        <div class="sidebar-foot" id="sidebarFoot">
          <div class="foot-progress">
            <div class="foot-progress-head">
              <span class="foot-label">今日完成</span>
              <span class="foot-count"><span id="todayDone">0</span>/<span id="todayTotal">0</span></span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="todayProgress"></div></div>
            <div class="foot-line">共 <span id="totalCount">0</span> 个习惯</div>
          </div>
        </div>
      </aside>

      <!-- 主内容 -->
      <main class="main" id="main">
        <!-- 空状态 -->
        <div class="empty" id="emptyState" hidden>
          <div class="empty-art">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="#007aff" stroke-width="1.6" opacity="0.35"/>
              <path d="M8 12.5L11 15.5L16 9.5" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="empty-title">还没有习惯</div>
          <div class="empty-sub">点击左上角加号，添加你的第一个习惯</div>
        </div>

        <!-- 详情视图 -->
        <section class="detail" id="detailView" hidden>
          <!-- 今日卡片 -->
          <div class="today-card" id="todayCard">
            <button class="check-circle" id="todayCheck" aria-label="今日打卡">
              <svg class="check-icon" width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path d="M5 12.5L10 17.5L19 6.5" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <svg class="check-plus" width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="today-text">
              <div class="today-eyebrow" id="todayEyebrow">今日打卡</div>
              <div class="today-name" id="todayName">习惯名</div>
              <div class="today-hint" id="todayHint">点击圆圈完成今日打卡</div>
            </div>
            <div class="today-streak">
              <div class="streak-badge">
                <span class="streak-num" id="todayStreak">0</span>
                <span class="streak-unit">天</span>
              </div>
              <div class="streak-label">连续打卡</div>
            </div>
          </div>

          <!-- 统计卡 -->
          <div class="stat-grid">
            <div class="stat-card" id="statCardCurrent">
              <div class="stat-icon stat-icon-flame">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2s4 3.5 4 8a4 4 0 11-8 0c0-1.5.5-2.5 1-3 .3 1 1 1.5 1.5 1.5C9 8 12 6 12 2z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
              </div>
              <div class="stat-body">
                <div class="stat-label">当前连续</div>
                <div class="stat-value"><span id="statCurrent">0</span><span class="stat-unit">天</span></div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon stat-icon-cup">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M7 4h10v4a5 5 0 01-10 0V4zM9 15h6M12 11v4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <div class="stat-body">
                <div class="stat-label">最长连续</div>
                <div class="stat-value"><span id="statLongest">0</span><span class="stat-unit">天</span></div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon stat-icon-week">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
              </div>
              <div class="stat-body">
                <div class="stat-label">本周完成率</div>
                <div class="stat-value"><span id="statWeek">0</span><span class="stat-unit">%</span></div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon stat-icon-month">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.7"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <div class="stat-body">
                <div class="stat-label">本月完成率</div>
                <div class="stat-value"><span id="statMonth">0</span><span class="stat-unit">%</span></div>
              </div>
            </div>
          </div>

          <!-- 月历 -->
          <div class="calendar-card">
            <div class="cal-head">
              <button class="cal-nav" id="prevMonth" aria-label="上个月">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <div class="cal-title" id="calTitle">2026 年 7 月</div>
              <button class="cal-nav" id="nextMonth" aria-label="下个月">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <button class="cal-today" id="goToday">回到今天</button>
            </div>
            <div class="cal-weekdays">
              <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <div class="cal-grid" id="calGrid"></div>
            <div class="cal-legend">
              <span class="lg-dot lg-empty"></span><span>未完成</span>
              <span class="lg-dot lg-done"></span><span>已完成</span>
              <span class="lg-dot lg-today"></span><span>今天</span>
            </div>
          </div>

          <!-- 习惯编辑 -->
          <div class="manage-card">
            <div class="manage-title">习惯设置</div>
            <div class="manage-row">
              <label class="manage-label">名称</label>
              <input class="manage-input" id="inputName" type="text" maxlength="24" placeholder="如：晨跑 30 分钟" />
            </div>
            <div class="manage-row">
              <label class="manage-label">图标</label>
              <div class="icon-picker" id="iconPicker"></div>
            </div>
            <div class="manage-row">
              <label class="manage-label">主题色</label>
              <div class="color-picker" id="colorPicker"></div>
            </div>
            <div class="manage-actions">
              <button class="btn-danger" id="btnDelete">删除习惯</button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- 新建/编辑模态 -->
  <div class="modal-mask" id="modalMask" hidden>
    <div class="modal">
      <div class="modal-title" id="modalTitle">新建习惯</div>
      <div class="modal-body">
        <div class="modal-row">
          <label>名称</label>
          <input id="modalName" type="text" maxlength="24" placeholder="如：读书 20 页" />
        </div>
        <div class="modal-row">
          <label>图标</label>
          <div class="icon-picker" id="modalIconPicker"></div>
        </div>
        <div class="modal-row">
          <label>主题色</label>
          <div class="color-picker" id="modalColorPicker"></div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-secondary" id="modalCancel">取消</button>
        <button class="btn-primary" id="modalOk">创建</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="renderer.js"></script>
</body>
</html>
