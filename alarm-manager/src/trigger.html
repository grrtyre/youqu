<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>闹钟响铃</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #ffffff;
      color: #1d1d1f;
      overflow: hidden;
      user-select: none;
    }
    .container {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f7 100%);
      position: relative;
      overflow: hidden;
    }
    .ring-deco {
      position: absolute;
      top: -100px;
      right: -100px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 122, 255, 0.12), transparent 70%);
      pointer-events: none;
    }
    .ring-deco-2 {
      position: absolute;
      bottom: -120px;
      left: -120px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 149, 0, 0.1), transparent 70%);
      pointer-events: none;
    }
    .icon-wrap {
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #007aff, #00a2ff);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 28px rgba(0, 122, 255, 0.35);
      animation: pulse 1.5s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); box-shadow: 0 14px 32px rgba(0, 122, 255, 0.45); }
    }
    .icon-wrap svg { color: #fff; }
    .label {
      margin-top: 24px;
      font-size: 16px;
      color: #6e6e73;
      letter-spacing: 0.04em;
    }
    .title {
      margin-top: 8px;
      font-size: 26px;
      font-weight: 600;
      color: #1d1d1f;
      text-align: center;
    }
    .time {
      margin-top: 18px;
      font-size: 64px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
      color: #007aff;
      line-height: 1;
    }
    .date {
      margin-top: 6px;
      font-size: 14px;
      color: #8e8e93;
    }
    .snooze-info {
      margin-top: 14px;
      font-size: 13px;
      color: #ff9500;
      min-height: 18px;
    }
    .actions {
      margin-top: 32px;
      display: flex;
      gap: 12px;
      z-index: 1;
    }
    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s ease;
    }
    .btn-snooze {
      background: #fff;
      color: #007aff;
      border: 1.5px solid #007aff;
    }
    .btn-snooze:hover {
      background: rgba(0, 122, 255, 0.08);
      transform: translateY(-1px);
    }
    .btn-dismiss {
      background: #007aff;
      color: #fff;
      box-shadow: 0 6px 16px rgba(0, 122, 255, 0.35);
    }
    .btn-dismiss:hover {
      background: #0066d6;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0, 122, 255, 0.45);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }
    .footer {
      position: absolute;
      bottom: 18px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: #c7c7cc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="ring-deco"></div>
    <div class="ring-deco-2"></div>
    <div class="icon-wrap">
      <svg viewBox="0 0 64 64" width="56" height="56">
        <circle cx="32" cy="34" r="22" fill="none" stroke="currentColor" stroke-width="3.5"/>
        <line x1="32" y1="34" x2="32" y2="20" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="32" y1="34" x2="44" y2="40" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="32" cy="34" r="3" fill="currentColor"/>
        <rect x="14" y="12" width="9" height="4" rx="2" transform="rotate(-30 14 12)" fill="currentColor"/>
        <rect x="41" y="12" width="9" height="4" rx="2" transform="rotate(30 50 12)" fill="currentColor"/>
      </svg>
    </div>
    <div class="label">闹钟响铃</div>
    <div class="title" id="title">起床</div>
    <div class="time" id="time">07:30</div>
    <div class="date" id="date">2026 年 7 月 14 日 周一</div>
    <div class="snooze-info" id="snoozeInfo"></div>
    <div class="actions">
      <button class="btn btn-snooze" id="btnSnooze">贪睡 5 分钟</button>
      <button class="btn btn-dismiss" id="btnDismiss">关闭闹钟</button>
    </div>
    <div class="footer">闹钟管家 · 本地优先 · 隐私安全</div>
  </div>
  <script src="trigger.js"></script>
</body>
</html>
