<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: file:;" />
  <title>剪贴板管家</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-glow"></div>

  <!-- 顶栏：可拖动 -->
  <header class="titlebar">
    <div class="brand">
      <span class="brand-icon">📋</span>
      <span class="brand-name">剪贴板管家</span>
    </div>
    <div class="titlebar-actions">
      <button class="icon-btn" id="settingsBtn" title="设置">⚙</button>
      <button class="icon-btn icon-btn-danger" id="closeBtn" title="隐藏">✕</button>
    </div>
  </header>

  <!-- 搜索栏 -->
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="搜索..." spellcheck="false" autocomplete="off" />
      <button class="search-clear" id="searchClear" title="清除">✕</button>
    </div>
    <div class="filter-tabs">
      <button class="tab active" data-filter="all">全部</button>
      <button class="tab" data-filter="favorite">⭐ 收藏</button>
      <button class="tab" data-filter="image">🖼 图片</button>
      <button class="tab" data-filter="code">&lt;/&gt; 代码</button>
      <button class="tab" data-filter="link">🔗 链接</button>
      <button class="tab" data-filter="text">📝 文本</button>
    </div>
  </div>

  <!-- 列表 -->
  <main class="list-wrap" id="listWrap">
    <div class="list" id="list">
      <!-- 由 JS 渲染 -->
    </div>
    <div class="empty" id="empty" hidden>
      <div class="empty-icon">📭</div>
      <div class="empty-text">还没有剪贴板历史</div>
      <div class="empty-hint">复制任何内容，就会出现在这里</div>
    </div>
  </main>

  <!-- 底栏 -->
  <footer class="footer">
    <span class="count" id="count">0 条记录</span>
    <span class="footer-hint">Ctrl + Shift + V 唤起</span>
    <div class="footer-btn-wrap">
      <button class="footer-btn" id="clearBtn">🗑 清空（保留收藏）</button>
    </div>
  </footer>

  <!-- 设置面板 -->
  <div class="settings-panel" id="settingsPanel" hidden>
    <div class="settings-content">
      <button class="settings-close-btn" id="closeSettings" title="关闭">✕</button>
      <h3>设置</h3>
      <div class="setting-row">
        <span>⌨️ 唤起快捷键</span>
        <code>Ctrl + Shift + V</code>
      </div>
      <div class="setting-row">
        <span>🧭 键盘导航</span>
        <div class="kbd-group">
          <code>↑ ↓ 选择 · Enter 粘贴</code>
          <code>Del 删除 · Esc 关闭</code>
        </div>
      </div>
      <div class="setting-row">
        <span>📁 数据存储位置</span>
        <code id="dataPath" class="data-path-code" title="">加载中…</code>
      </div>
      <div class="setting-row">
        <span>📦 最多保留</span>
        <div class="kbd-group">
          <code>500 条文本</code>
          <code>50 张图片</code>
        </div>
      </div>
      <div class="setting-row">
        <span>⚡ 自动粘贴到前台窗口</span>
        <label class="switch">
          <input type="checkbox" id="autoPasteToggle" checked />
          <span class="slider"></span>
        </label>
      </div>
      <button class="afdian-btn" id="afdianLink">☕ 爱发电支持我们</button>
      <div class="setting-row about">
        <span>由 Trae + MiMo Code 协作打造 · v1.3.0</span>
      </div>
    </div>
  </div>

  <!-- 清空确认弹窗 -->
  <div class="confirm-modal" id="confirmModal" hidden>
    <div class="confirm-content">
      <div class="confirm-icon">⚠️</div>
      <h4 class="confirm-title">清空剪贴板历史？</h4>
      <p class="confirm-desc">将删除所有非置顶、非收藏的记录。此操作不可撤销。</p>
      <div class="confirm-actions">
        <button class="confirm-cancel" id="confirmCancel">取消</button>
        <button class="confirm-ok" id="confirmOk">清空</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="renderer.js"></script>
</body>
</html>
