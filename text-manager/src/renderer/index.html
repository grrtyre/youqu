<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文本管家</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 自定义标题栏 -->
    <header class="titlebar">
      <div class="titlebar-drag">
        <div class="titlebar-brand">
          <svg viewBox="0 0 32 32" width="16" height="16" class="titlebar-logo">
            <rect x="3" y="6" width="26" height="20" rx="4" fill="#007aff"/>
            <rect x="7" y="10" width="14" height="2.2" rx="1.1" fill="#fff"/>
            <rect x="7" y="15" width="18" height="2.2" rx="1.1" fill="#fff"/>
            <rect x="7" y="20" width="10" height="2.2" rx="1.1" fill="#fff"/>
          </svg>
          <span>文本管家</span>
        </div>
      </div>
      <div class="titlebar-controls">
        <button class="win-btn" id="winMin" title="最小化" aria-label="最小化">
          <svg viewBox="0 0 10 10" width="10" height="10"><rect x="1" y="4.5" width="8" height="1.2" fill="currentColor"/></svg>
        </button>
        <button class="win-btn" id="winMax" title="最大化" aria-label="最大化">
          <svg viewBox="0 0 10 10" width="10" height="10" class="icon-max"><rect x="1.2" y="1.2" width="7.6" height="7.6" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          <svg viewBox="0 0 10 10" width="10" height="10" class="icon-restore" hidden><rect x="1.5" y="3" width="5.5" height="5.5" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M3.5 3 V1.5 H9 V7 H7.5" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button class="win-btn win-close" id="winClose" title="关闭" aria-label="关闭">
          <svg viewBox="0 0 10 10" width="10" height="10"><path d="M1.5 1.5 L8.5 8.5 M8.5 1.5 L1.5 8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <div class="app-body">
      <!-- 左侧导航 -->
      <aside class="sidebar">
        <nav class="nav" id="nav">
          <button class="nav-item active" data-op="replace">
            <svg class="nav-icon" viewBox="0 0 20 20" width="18" height="18"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M14 3l3 2-3 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M6 13l-3 2 3 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            <span class="nav-label">批量替换</span>
          </button>
          <button class="nav-item" data-op="split">
            <svg class="nav-icon" viewBox="0 0 20 20" width="18" height="18"><path d="M3 5h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M2.5 5V3.5M2.5 5V6.5M6 5V3.5M6 5V6.5M10 5V3.5M10 5V6.5M14 5V3.5M14 5V6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M2.5 15v-3M10 15v-3M14 15v-3M6 15v-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            <span class="nav-label">文本分割</span>
          </button>
          <button class="nav-item" data-op="extract">
            <svg class="nav-icon" viewBox="0 0 20 20" width="18" height="18"><circle cx="8.5" cy="8.5" r="5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12.5 12.5 L17 17" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
            <span class="nav-label">模式提取</span>
          </button>
          <button class="nav-item" data-op="case">
            <svg class="nav-icon" viewBox="0 0 20 20" width="18" height="18"><text x="3" y="14" font-size="11" font-family="-apple-system,sans-serif" font-weight="600" fill="currentColor">Aa</text></svg>
            <span class="nav-label">大小写转换</span>
          </button>
          <button class="nav-item" data-op="dedupe">
            <svg class="nav-icon" viewBox="0 0 20 20" width="18" height="18"><path d="M4 6h12M4 10h12M4 14h7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M14.5 12.5l3 3-1.4 1.4-3-3z M13 15.5V18h2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            <span class="nav-label">去重</span>
          </button>
          <button class="nav-item" data-op="lines">
            <svg class="nav-icon" viewBox="0 0 20 20" width="18" height="18"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            <span class="nav-label">行处理</span>
          </button>
          <button class="nav-item" data-op="encode">
            <svg class="nav-icon" viewBox="0 0 20 20" width="18" height="18"><path d="M7 5L3 10l4 5M13 5l4 5-4 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            <span class="nav-label">编码转换</span>
          </button>
          <button class="nav-item" data-op="stats">
            <svg class="nav-icon" viewBox="0 0 20 20" width="18" height="18"><path d="M4 16V9M10 16V4M16 16v-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span class="nav-label">统计</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <button class="link-btn" id="openAfdian">
            <svg viewBox="0 0 20 20" width="14" height="14"><path d="M10 3v10M6 9c0 2.2 1.8 4 4 4s4-1.8 4-4M8 16h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>
            <span>支持我们</span>
          </button>
          <div class="sidebar-version">v1.1.0</div>
        </div>
      </aside>

      <!-- 主区 -->
      <main class="main">
        <header class="topbar">
          <div class="topbar-title">
            <h1 id="opTitle">批量替换</h1>
            <p id="opSubtitle">支持普通文本与正则表达式</p>
          </div>
          <div class="topbar-actions">
            <button class="ghost-btn" id="btnOpenFile" title="从文件导入">
              <svg viewBox="0 0 20 20" width="14" height="14"><path d="M3 5a1 1 0 011-1h4l2 2h6a1 1 0 011 1v7a1 1 0 01-1 1H4a1 1 0 01-1-1V5z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
              <span class="btn-text">导入文件</span>
            </button>
            <button class="ghost-btn" id="btnClear" title="清空">
              <svg viewBox="0 0 20 20" width="14" height="14"><path d="M4 6h12M7 6V4h6v2M6 6l1 10h6l1-10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span class="btn-text">清空</span>
            </button>
            <span class="action-divider"></span>
            <button class="primary-btn" id="btnRun" title="运行（Ctrl+Enter）">
              <svg viewBox="0 0 20 20" width="12" height="12"><path d="M5 3l12 7-12 7z" fill="currentColor"/></svg>
              <span>运行</span>
            </button>
          </div>
        </header>

        <!-- 选项面板 -->
        <section class="options-panel" id="optionsPanel">
          <!-- 动态注入 -->
        </section>

        <!-- 输入输出区 -->
        <section class="editor-area">
          <div class="editor-col">
            <div class="editor-head">
              <label>输入</label>
              <span class="char-count" id="inputCount">0 字符</span>
            </div>
            <textarea id="inputText" class="editor" placeholder="在此粘贴或输入文本…  支持拖入 .txt 文件"></textarea>
          </div>

          <div class="editor-col">
            <div class="editor-head">
              <label>输出</label>
              <div class="editor-head-actions">
                <button class="icon-btn" id="btnSwap" title="把输出填回输入">
                  <svg viewBox="0 0 20 20" width="14" height="14"><path d="M4 8h11l-3-3M16 12H5l3 3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button class="icon-btn" id="btnCopy" title="复制输出">
                  <svg viewBox="0 0 20 20" width="14" height="14"><rect x="5" y="5" width="11" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M4 14V4a1 1 0 011-1h9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
                <button class="icon-btn" id="btnSave" title="保存输出">
                  <svg viewBox="0 0 20 20" width="14" height="14"><path d="M4 4a1 1 0 011-1h10a1 1 0 011 1v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M7 3v4h6V3M7 14h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
                </button>
                <span class="char-count" id="outputCount">0 字符</span>
              </div>
            </div>
            <textarea id="outputText" class="editor" readonly placeholder="处理结果将显示在这里…"></textarea>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- 关于弹窗 -->
  <div class="modal-mask" id="aboutModal" hidden>
    <div class="modal">
      <div class="modal-icon">
        <svg viewBox="0 0 32 32" width="48" height="48">
          <rect x="3" y="6" width="26" height="20" rx="4" fill="#007aff"/>
          <rect x="7" y="10" width="14" height="2.4" rx="1.2" fill="#fff"/>
          <rect x="7" y="15" width="18" height="2.4" rx="1.2" fill="#fff"/>
          <rect x="7" y="20" width="10" height="2.4" rx="1.2" fill="#fff"/>
        </svg>
      </div>
      <h2>文本管家</h2>
      <p class="modal-version" id="aboutVersion">版本 1.1.0</p>
      <p class="modal-desc">Windows 上最优雅的批量文本处理工具<br/>替换 · 分割 · 提取 · 大小写 · 去重 · 行处理 · 编码 · 统计</p>
      <div class="modal-actions">
        <button class="primary-btn" id="aboutClose">知道了</button>
      </div>
      <p class="modal-footer">MIT License · © 2026 grrtyre</p>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="../core/text-ops.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
