<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>识字管家</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- 标题栏（可拖拽） -->
<header class="titlebar">
  <div class="brand">
    <div class="logo">识</div>
    <div class="brand-text">
      <div class="brand-name">识字管家</div>
      <div class="brand-sub">本地离线 OCR · 中英文识别</div>
    </div>
  </div>
  <div class="titlebar-drag"></div>
  <div class="win-ctrl">
    <button class="win-btn" id="btnHistory" title="历史记录">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="7.5" stroke="currentColor" stroke-width="1.6"/>
        <path d="M10 6 V10 L13 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="win-sep"></span>
    <button class="win-btn" id="btnMin" title="最小化">
      <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1.5" y="5.5" width="9" height="1.2" rx="0.6" fill="currentColor"/></svg>
    </button>
    <button class="win-btn win-close" id="btnClose" title="关闭">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3 L9 9 M9 3 L3 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    </button>
  </div>
</header>

<main class="layout">
  <!-- 左：图像源 -->
  <section class="pane pane-source">
    <div class="pane-head">
      <h2>图像</h2>
      <div class="pane-actions">
        <button class="chip" id="btnFile">选择图片</button>
        <button class="chip" id="btnPaste">粘贴</button>
        <button class="chip" id="btnShot">截图识别</button>
      </div>
    </div>

    <div class="dropzone" id="dropzone">
      <div class="dz-inner" id="dzInner">
        <div class="dz-icon">
          <svg width="96" height="96" viewBox="0 0 48 48" fill="none">
            <rect x="6" y="8" width="36" height="28" rx="5" stroke="#b8d4f3" stroke-width="1.6" fill="#f7fbff"/>
            <circle cx="15" cy="17" r="3" fill="#007aff" opacity=".65"/>
            <path d="M9 32 L18 23 L25 30 L31 24 L39 32" stroke="#cfe2f5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M24 38 V44 M20 42 L24 38 L28 42" stroke="#007aff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="dz-title">拖拽图片到此处</div>
        <div class="dz-sub">或使用上方按钮 · 支持 PNG / JPG / BMP / WebP</div>
      </div>
      <img class="preview" id="preview" alt="预览" style="display:none">
      <div class="img-meta" id="imgMeta" style="display:none"></div>
    </div>

    <!-- 批量队列 -->
    <div class="queue" id="queue" style="display:none">
      <div class="queue-head">
        <span class="queue-title">批量队列 <em id="queueCount">0</em></span>
        <button class="chip chip-mini" id="btnClearQueue">清空</button>
      </div>
      <div class="queue-list" id="queueList"></div>
    </div>

    <div class="source-bar">
      <span class="stat">支持 PNG / JPG / BMP / WebP</span>
      <span class="stat stat-right">Ctrl+V 粘贴 · Ctrl+Enter 识别</span>
    </div>
  </section>

  <!-- 右：结果 -->
  <section class="pane pane-result">
    <div class="pane-head">
      <h2>识别结果</h2>
      <div class="pane-actions">
        <select class="select" id="langSelect" title="识别语言"></select>
        <button class="chip chip-primary" id="btnRecognize">开始识别</button>
        <span class="action-sep"></span>
        <button class="chip" id="btnCopy">复制</button>
        <button class="chip" id="btnClear">清空</button>
        <button class="chip" id="btnExport">导出</button>
      </div>
    </div>

    <!-- 进度 -->
    <div class="progress" id="progress" style="display:none">
      <div class="progress-bar"><span id="progressFill"></span></div>
      <div class="progress-text" id="progressText">准备中…</div>
    </div>

    <div class="result-wrap">
      <textarea class="result" id="result" placeholder="" spellcheck="false"></textarea>
      <div class="result-empty" id="resultEmpty">
        <div class="re-icon">
          <svg width="96" height="96" viewBox="0 0 48 48" fill="none">
            <rect x="6" y="7" width="32" height="36" rx="5" stroke="#b8d4f3" stroke-width="1.6" fill="#f7fbff"/>
            <path d="M12 16 H32 M12 23 H28 M12 30 H23" stroke="#cfe2f5" stroke-width="2" stroke-linecap="round"/>
            <circle cx="34" cy="32" r="10" fill="#eaf4ff" stroke="#007aff" stroke-width="2"/>
            <path d="M40 38 L46 44" stroke="#007aff" stroke-width="2.6" stroke-linecap="round"/>
            <path d="M30 32 H38 M34 28 V36" stroke="#007aff" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="re-text">载入图片即可识别</div>
        <div class="re-sub">支持拖拽、粘贴、截图 · 结果可编辑与导出</div>
      </div>
    </div>

    <div class="statusbar">
      <span class="stat stat-ready" id="statReady">就绪</span>
      <span class="stat" id="statConf" style="display:none">置信度 暂无</span>
      <span class="stat" id="statChars" style="display:none">字数 0</span>
      <span class="stat" id="statCjk" style="display:none">汉字 0</span>
      <span class="stat" id="statWords" style="display:none">单词 0</span>
      <label class="auto-copy"><input type="checkbox" id="autoCopy"> 识别后自动复制</label>
      <span class="stat stat-right" id="statLang"></span>
      <span class="stat stat-version">v1.0.1</span>
    </div>
  </section>
</main>

<!-- 历史侧栏 -->
<aside class="history" id="history">
  <div class="history-head">
    <h3>历史</h3>
    <button class="chip chip-mini" id="btnClearHistory">清空</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty">暂无历史记录</div>
  </div>
</aside>

<!-- Toast -->
<div class="toast" id="toast"></div>

<input type="file" id="fileInput" accept="image/*" multiple style="display:none">
<script src="renderer.js"></script>
</body>
</html>
