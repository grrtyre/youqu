<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>启动项管家</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 顶部栏 -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2.5c-.4 0-.8.2-1 .5L8.5 7C6.9 8.4 6 10.4 6 12.6 6 16.7 9.1 20 12 20s6-3.3 6-7.4c0-2.2-.9-4.2-2.5-5.6L13 3c-.2-.3-.6-.5-1-.5z" fill="#fff" opacity=".96"/>
            <path d="M12 7.5c-1.6 1.3-2.5 3-2.5 5 0 1.7.9 3.2 2.5 4.5 1.6-1.3 2.5-2.8 2.5-4.5 0-2-.9-3.7-2.5-5z" fill="#007aff" opacity=".5"/>
            <circle cx="12" cy="12.5" r="1.4" fill="#007aff"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>启动项管家 <span class="ver">v1.0.0</span></h1>
          <p>可视化查看与切换 Windows 开机启动项</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="btn-refresh" class="btn btn-ghost" title="刷新">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          刷新
        </button>
        <button id="btn-add" class="btn btn-primary" title="新增启动项">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          新增
        </button>
      </div>
    </header>

    <!-- 统计卡片 -->
    <section class="stats" id="stats" aria-label="统计">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">启动项总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-enabled">0</div>
        <div class="stat-label"><span class="stat-dot on"></span>已启用</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-disabled">0</div>
        <div class="stat-label"><span class="stat-dot off"></span>已禁用</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-sources">0</div>
        <div class="stat-label">来源数</div>
      </div>
    </section>

    <!-- 工具栏 -->
    <section class="toolbar">
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="search" type="text" placeholder="搜索名称、命令或来源…" />
      </div>
      <div class="filter-tabs" role="tablist">
        <button class="tab active" data-filter="all">全部</button>
        <button class="tab" data-filter="enabled">已启用</button>
        <button class="tab" data-filter="disabled">已禁用</button>
      </div>
    </section>

    <!-- 列表 -->
    <main class="list-wrap">
      <div id="list" class="list"></div>
      <div id="empty" class="empty hidden">
        <div class="empty-ico">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#c7c7cc" stroke-width="1.4"><path d="M12 3v18M3 12h18"/></svg>
        </div>
        <p class="empty-title">暂无启动项</p>
        <p class="empty-sub">没有匹配的结果，试试清除筛选条件</p>
      </div>
      <div id="loading" class="loading hidden">
        <div class="skel"></div><div class="skel"></div><div class="skel"></div>
      </div>
    </main>

    <!-- 底部 -->
    <footer class="footer">
      <span class="foot-note">提示：禁用 HKLM 项需要管理员权限</span>
      <a class="afdian" id="afdian" href="#">爱发电 · 支持我们 →</a>
    </footer>
  </div>

  <!-- 新增弹窗 -->
  <div id="modal" class="modal hidden">
    <div class="modal-mask"></div>
    <div class="modal-card">
      <div class="modal-head">
        <h2>新增启动项</h2>
        <button class="modal-close" id="modal-close" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span class="field-label">名称</span>
          <input id="f-name" type="text" placeholder="如：我的工具" />
        </label>
        <label class="field">
          <span class="field-label">启动命令</span>
          <input id="f-command" type="text" placeholder='如：C:\Apps\tool.exe /min' />
          <span class="field-hint">将写入“注册表·当前用户”的 Run 项</span>
        </label>
        <p id="modal-error" class="modal-error hidden"></p>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-ok">添加</button>
      </div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div id="confirm" class="modal hidden">
    <div class="modal-mask"></div>
    <div class="modal-card modal-card-sm">
      <div class="modal-head">
        <h2>删除启动项</h2>
      </div>
      <div class="modal-body">
        <p class="confirm-text">确定要删除 <b id="confirm-name"></b> 吗？此操作不可撤销。</p>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" id="confirm-cancel">取消</button>
        <button class="btn btn-danger" id="confirm-ok">删除</button>
      </div>
    </div>
  </div>

  <!-- toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="renderer.js"></script>
</body>
</html>
