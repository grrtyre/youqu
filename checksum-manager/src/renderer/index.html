<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校验管家</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 顶部标题栏 -->
  <header class="topbar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 12l2 2 4-4" />
        <path d="M21 12c0 5-3.5 7.5-8.5 9-5-1.5-8.5-4-8.5-9V5l8.5-3 8.5 3v7z" />
      </svg>
    </div>
    <div class="title-wrap">
      <div class="title">校验管家</div>
      <div class="subtitle">文件完整性校验 · 纯本地计算</div>
    </div>
    <div class="actions">
      <div class="tabs" id="modeTabs">
        <button class="tab active" data-mode="single">单文件</button>
        <button class="tab" data-mode="batch">批量</button>
      </div>
    </div>
  </header>

  <div class="layout">
    <!-- 左侧导航 -->
    <aside class="sidebar">
      <div class="nav-item active" data-view="compute">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        <span>计算校验</span>
      </div>
      <div class="nav-item" data-view="verify">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span>哈希校验</span>
      </div>
      <div class="nav-item" data-view="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>历史记录</span>
        <span class="badge" id="historyBadge" style="display:none">0</span>
      </div>
      <div class="nav-item" data-view="help">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span>使用帮助</span>
      </div>
      <div class="foot">
        <b>v1.0.0</b><br/>本地计算 · 数据不出本机
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main" id="main">
      <!-- 内容由 JS 动态渲染 -->
    </main>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-wrap" id="toastWrap"></div>

  <script src="renderer.js"></script>
</body>
</html>
