<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>屏幕尺管家 · 测量</title>
  <link rel="stylesheet" href="overlay.css">
</head>
<body>
  <!-- 顶部工具栏 -->
  <header id="toolbar">
    <div class="seg-group">
      <button class="seg active" data-mode="rect" title="矩形测量（R）">▭</button>
      <button class="seg" data-mode="line" title="直线测量（L）">／</button>
      <button class="seg" data-mode="pick" title="取色（P）">◐</button>
    </div>
    <div class="info">
      <span id="coord">x: 0, y: 0</span>
      <span class="sep">·</span>
      <span id="colorInfo">—</span>
      <span id="colorSwatch" class="swatch"></span>
    </div>
    <div class="grow"></div>
    <div class="seg-group">
      <button id="copyBtn" class="seg" title="复制测量结果（C）">复制</button>
      <button id="saveBtn" class="seg" title="保存到历史（S）">保存</button>
      <button id="closeBtn" class="seg warn" title="退出（ESC）">退出</button>
    </div>
  </header>

  <!-- 画布层 -->
  <canvas id="bg"></canvas>
  <canvas id="draw"></canvas>

  <!-- 底部提示 -->
  <footer id="hint">
    <kbd>ESC</kbd> 退出 · <kbd>R/L/P</kbd> 切换模式 · <kbd>C</kbd> 复制 · <kbd>S</kbd> 保存 · 拖拽测量
  </footer>

  <!-- ruler-core.js 提供几何/颜色/格式化纯函数（UMD，挂 window.RulerCore），与单元测试同源 -->
  <script src="../core/ruler-core.js"></script>
  <script src="overlay.js"></script>
</body>
</html>
