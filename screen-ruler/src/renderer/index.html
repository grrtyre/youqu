<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline';">
  <title>屏幕标尺管家</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="titlebar">
    <div class="dots">
      <span class="dot red" data-action="close" title="关闭"></span>
      <span class="dot yellow" data-action="minimize" title="最小化"></span>
      <span class="dot green" data-action="maximize" title="最大化/还原"></span>
    </div>
    <span class="title">屏幕标尺管家</span>
  </div>

  <div class="container">
    <header class="hero">
      <div class="hero-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="1.5"/><path d="M6 6v3M10 6v4M14 6v3M18 6v4"/></svg>
      </div>
      <div class="hero-text">
        <h1>屏幕标尺管家</h1>
        <p>一站式屏幕测量工具 · 标尺 / 框选 / 距离 / 量角器 / 放大镜 / 标注</p>
      </div>
    </header>

    <section class="tools">
      <button class="tool-card" data-tool="ruler">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="1.5"/><path d="M6 6v3M10 6v4M14 6v3M18 6v4"/></svg>
        </div>
        <div class="tool-name">标尺模式</div>
        <div class="tool-desc">显示坐标与十字线</div>
      </button>
      <button class="tool-card" data-tool="rect">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 2"><rect x="3" y="5" width="18" height="14" rx="1"/></svg>
        </div>
        <div class="tool-name">框选测量</div>
        <div class="tool-desc">拖拽框选区域，显示宽高</div>
      </button>
      <button class="tool-card" data-tool="line">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="19" r="2"/><circle cx="19" cy="5" r="2"/><path d="M7 17L17 7"/></svg>
        </div>
        <div class="tool-name">距离测量</div>
        <div class="tool-desc">两点连线，显示长度与角度</div>
      </button>
      <button class="tool-card" data-tool="angle">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20L20 20"/><path d="M4 20L18 6"/><path d="M4 20 A10 10 0 0 0 12 12" fill="rgba(0,122,255,0.1)"/></svg>
        </div>
        <div class="tool-name">量角器</div>
        <div class="tool-desc">三点定角，量任意夹角</div>
      </button>
      <button class="tool-card" data-tool="magnifier">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M20 20l-5.2-5.2"/></svg>
        </div>
        <div class="tool-name">放大镜</div>
        <div class="tool-desc">跟随鼠标像素级放大</div>
      </button>
      <button class="tool-card" data-tool="free">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17C5 14 7 14 9 17s4 3 6 0 4-3 6 0"/><path d="M4 6l1 1M8 4l1 1M12 3l1 1"/></svg>
        </div>
        <div class="tool-name">自由标注</div>
        <div class="tool-desc">在屏幕上自由涂画</div>
      </button>
    </section>

    <section class="cta">
      <button id="startBtn" class="primary-btn">开始测量（Ctrl+Shift+R）</button>
    </section>

    <section class="shortcuts">
      <h3>快捷键</h3>
      <ul>
        <li><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>R</kbd> · 显示 / 隐藏 测量覆盖层</li>
        <li><kbd>1</kbd> ~ <kbd>6</kbd> · 在覆盖层中快速切换工具</li>
        <li><kbd>Esc</kbd> · 隐藏覆盖层</li>
        <li><kbd>C</kbd> · 清空当前测量</li>
        <li><kbd>S</kbd> · 保存当前画面为图片</li>
      </ul>
    </section>

    <footer class="footer">
      <div>
        <a class="link" href="https://www.ifdian.net/a/giquwei" target="_blank" rel="noopener">☕ 爱发电 · 支持我们</a>
      </div>
      <div class="version">v1.1.0 · MIT License</div>
    </footer>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
